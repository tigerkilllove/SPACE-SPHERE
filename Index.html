<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Social Ocean — Live Data Prototype</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #02050a;
      color: white;
      font-family: Inter, Arial, sans-serif;
      touch-action: none;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    .main-btn {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      z-index: 20;
      height: 54px;
      padding: 0 26px;
      border: 0;
      border-radius: 999px;
      color: #03111b;
      background: linear-gradient(135deg, #f4fdff, #7ce6ff 55%, #a4ffdf);
      font-weight: 950;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 16px 55px rgba(0, 230, 255, 0.26), 0 0 0 1px rgba(255,255,255,0.35) inset;
    }

    .main-btn:active {
      transform: translateX(-50%) translateY(1px);
    }

    .mini-panel {
      position: fixed;
      right: 14px;
      bottom: 18px;
      z-index: 20;
      display: flex;
      gap: 8px;
    }

    .mini {
      min-width: 42px;
      width: auto;
      height: 42px;
      padding: 0 10px;
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 50%;
      color: rgba(255,255,255,0.90);
      background: rgba(4, 12, 22, 0.48);
      backdrop-filter: blur(14px);
      cursor: pointer;
      font-size: 17px;
      font-weight: 900;
    }

    .mini.active {
      color: #03111b;
      background: linear-gradient(135deg, #f4fdff, #7ce6ff 55%, #a4ffdf);
      box-shadow: 0 0 30px rgba(124,230,255,0.28);
    }

    .stats {
      position: fixed;
      left: 14px;
      bottom: 18px;
      z-index: 20;
      padding: 9px 12px;
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 999px;
      color: rgba(255,255,255,0.86);
      background: rgba(4, 12, 22, 0.48);
      backdrop-filter: blur(14px);
      font-size: 13px;
      font-weight: 850;
      user-select: none;
    }

    .stats span {
      color: #a4ffdf;
    }

    .composer {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      place-items: end center;
      padding: 18px;
      box-sizing: border-box;
      background: rgba(0,0,0,0.38);
      backdrop-filter: blur(7px);
    }

    .composer.show {
      display: grid;
    }

    .composer-card {
      width: min(720px, 100%);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      background: rgba(5, 15, 26, 0.90);
      box-shadow: 0 22px 80px rgba(0,0,0,0.58);
      backdrop-filter: blur(18px);
      padding: 12px;
      box-sizing: border-box;
    }

    .composer-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 3px 5px 11px;
      color: rgba(255,255,255,0.78);
      font-size: 13px;
      font-weight: 800;
      user-select: none;
    }

    .composer-row {
      display: flex;
      gap: 10px;
      align-items: end;
    }

    #postInput,
    #commentInput {
      flex: 1;
      min-height: 54px;
      max-height: 140px;
      resize: vertical;
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 16px;
      color: white;
      background: rgba(255,255,255,0.08);
      outline: none;
      padding: 13px 14px;
      font: inherit;
      font-size: 15px;
      box-sizing: border-box;
    }

    #commentInput {
      min-height: 46px;
      max-height: 90px;
      border-radius: 14px;
    }

    #postInput::placeholder,
    #commentInput::placeholder {
      color: rgba(255,255,255,0.48);
    }

    .attach-label,
    .icon-btn {
      display: grid;
      place-items: center;
      width: 48px;
      height: 48px;
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 16px;
      color: rgba(255,255,255,0.88);
      background: rgba(255,255,255,0.08);
      cursor: pointer;
      flex: 0 0 auto;
      font-size: 21px;
      box-sizing: border-box;
    }

    #fileInput {
      display: none;
    }

    .send {
      height: 48px;
      padding: 0 18px;
      border: 0;
      border-radius: 16px;
      color: #03111b;
      background: linear-gradient(135deg, #f4fdff, #7ce6ff 55%, #a4ffdf);
      font-weight: 950;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .file-name {
      display: none;
      margin: 0 0 9px 4px;
      font-size: 12px;
      color: rgba(255,255,255,0.62);
      user-select: none;
    }

    .file-name.show {
      display: block;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: none;
      place-items: center;
      background: rgba(0,0,0,0.46);
      backdrop-filter: blur(8px);
      padding: 16px;
      box-sizing: border-box;
    }

    .modal.show {
      display: grid;
    }

    .post-panel,
    .profile-panel {
      width: min(560px, 100%);
      max-height: min(780px, calc(100vh - 32px));
      overflow: auto;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 26px;
      background: rgba(5, 15, 26, 0.92);
      box-shadow: 0 22px 90px rgba(0,0,0,0.62);
      padding: 14px;
      box-sizing: border-box;
    }

    .post-panel {
      touch-action: pan-y;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }

    .post-panel.swipe-right {
      transform: translateX(28px) rotate(1.4deg);
      border-color: rgba(164,255,223,0.60);
      box-shadow: 0 22px 90px rgba(0,0,0,0.62), 0 0 42px rgba(164,255,223,0.20);
    }

    .post-panel.swipe-left {
      transform: translateX(-28px) rotate(-1.4deg);
      border-color: rgba(255,132,198,0.60);
      box-shadow: 0 22px 90px rgba(0,0,0,0.62), 0 0 42px rgba(255,132,198,0.20);
    }

    .post-panel.swipe-up {
      transform: translateY(-28px) scale(0.98);
      border-color: rgba(255,255,255,0.28);
    }

    .post-head,
    .profile-head {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 4px 3px 12px;
    }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #03111b;
      font-weight: 950;
      background: linear-gradient(135deg, #f4fdff, #7ce6ff 55%, #a4ffdf);
      box-shadow: 0 0 24px rgba(124,230,255,0.24);
      flex: 0 0 auto;
    }

    .post-user,
    .profile-name {
      flex: 1;
      min-width: 0;
    }

    .nick {
      font-weight: 950;
      color: rgba(255,255,255,0.95);
      cursor: pointer;
      word-break: break-word;
    }

    .meta {
      font-size: 12px;
      color: rgba(255,255,255,0.52);
      margin-top: 2px;
    }

    .follow {
      height: 38px;
      padding: 0 13px;
      border: 0;
      border-radius: 999px;
      color: #03111b;
      background: linear-gradient(135deg, #f4fdff, #7ce6ff 55%, #a4ffdf);
      font-weight: 950;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .follow.following {
      color: rgba(255,255,255,0.84);
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.13);
    }

    .modal-close {
      height: 38px;
      width: 38px;
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 50%;
      color: rgba(255,255,255,0.86);
      background: rgba(255,255,255,0.08);
      cursor: pointer;
      flex: 0 0 auto;
    }

    .post-body {
      border-radius: 22px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.10);
      padding: 15px;
      box-sizing: border-box;
      line-height: 1.45;
      color: rgba(255,255,255,0.88);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .post-image {
      display: none;
      margin-top: 12px;
      width: 100%;
      max-height: 360px;
      object-fit: cover;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.10);
    }

    .post-image.show {
      display: block;
    }

    .actions {
      display: flex;
      gap: 9px;
      padding: 12px 2px;
    }

    .action {
      height: 36px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.84);
      background: rgba(255,255,255,0.07);
      font-weight: 850;
      cursor: pointer;
    }

    .action.active {
      color: #03111b;
      background: linear-gradient(135deg, #ffd6f3, #ff83c7);
      border-color: transparent;
    }

    .comments-title {
      margin: 6px 2px 9px;
      font-weight: 900;
      color: rgba(255,255,255,0.80);
      font-size: 13px;
    }

    .comments {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
      max-height: 210px;
      overflow: auto;
    }

    .comment {
      border-radius: 14px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 9px 10px;
      color: rgba(255,255,255,0.82);
      font-size: 13px;
      line-height: 1.35;
    }

    .comment b {
      color: #a4ffdf;
    }

    .comment-row {
      display: flex;
      gap: 9px;
      align-items: end;
    }

    .profile-bio {
      border-radius: 18px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.10);
      padding: 12px;
      color: rgba(255,255,255,0.80);
      line-height: 1.4;
      margin-bottom: 12px;
    }

    .profile-posts {
      display: grid;
      gap: 8px;
    }

    .profile-post {
      padding: 10px 11px;
      border-radius: 14px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.82);
      cursor: pointer;
      font-size: 13px;
      line-height: 1.35;
    }

    .toast {
      position: fixed;
      left: 50%;
      top: 18px;
      transform: translateX(-50%) translateY(-8px);
      z-index: 80;
      max-width: min(560px, calc(100vw - 34px));
      padding: 11px 14px;
      border-radius: 999px;
      background: rgba(4, 12, 22, 0.62);
      border: 1px solid rgba(124,230,255,0.18);
      color: rgba(255,255,255,0.88);
      backdrop-filter: blur(14px);
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: .2s ease;
      text-align: center;
      box-sizing: border-box;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 4;
      background:
        radial-gradient(circle at 50% 45%, transparent 0%, transparent 47%, rgba(0,0,0,0.30) 100%),
        linear-gradient(to bottom, rgba(0,0,0,0.22), transparent 30%, rgba(0,0,0,0.30));
    }

    @media (max-width: 700px) {
      .main-btn {
        bottom: 15px;
        height: 50px;
        font-size: 15px;
      }

      .mini-panel {
        right: 10px;
        bottom: 14px;
        flex-direction: column;
      }

      .mini {
        min-width: 38px;
        width: auto;
        height: 38px;
        padding: 0 9px;
        font-size: 13px;
      }

      .stats {
        left: 10px;
        bottom: 15px;
        font-size: 12px;
      }

      .composer {
        padding: 10px;
      }

      .composer-row,
      .comment-row {
        gap: 8px;
      }

      .send {
        padding: 0 13px;
      }

      .attach-label,
      .icon-btn {
        width: 44px;
        height: 44px;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <button class="main-btn" id="createBtn" type="button">Бросить пост</button>

  <div class="stats">
    live <span id="liveCount">0</span> · подписки <span id="followCount">0</span> · посты <span id="postCount">0</span> · энергия <span id="energyCount">0</span> · маяк <span id="beaconLevel">0</span>
  </div>

  <div class="mini-panel">
    <button class="mini" id="liveBtn" type="button" title="Подгрузить реальные данные">LIVE</button>
    <button class="mini" id="buildBeaconBtn" type="button" title="Построить / улучшить маяк вкуса">◇</button>
    <button class="mini" id="randomPostBtn" type="button" title="Случайный пост">?</button>
    <button class="mini" id="trendBtn" type="button" title="Тренд-волна">↯</button>
  </div>

  <div class="composer" id="composer">
    <div class="composer-card">
      <div class="composer-title">
        <span>@you бросает новый пост в океан</span>
        <span>текст / картинка / ссылка</span>
      </div>
      <div class="file-name" id="fileName"></div>
      <div class="composer-row">
        <label class="attach-label" title="Прикрепить изображение">
          +
          <input id="fileInput" type="file" accept="image/*" />
        </label>
        <textarea id="postInput" maxlength="180" placeholder="Напиши пост, мысль, кринж, новость или ссылку..."></textarea>
        <button class="send" id="sendPostBtn" type="button">В поток</button>
        <button class="icon-btn" id="closeComposerBtn" type="button">×</button>
      </div>
    </div>
  </div>

  <div class="modal" id="postModal">
    <div class="post-panel">
      <div class="post-head">
        <div class="avatar" id="postAvatar">?</div>
        <div class="post-user">
          <div class="nick" id="postNick">@user</div>
          <div class="meta" id="postMeta">floating post</div>
        </div>
        <button class="follow" id="postFollowBtn" type="button">Подписаться</button>
        <button class="modal-close" id="closePostBtn" type="button">×</button>
      </div>

      <div class="post-body" id="postBody"></div>
      <img class="post-image" id="postImage" alt="attached image" />

      <div class="actions">
        <button class="action" id="likeBtn" type="button">♡ лайк</button>
        <button class="action" id="commentFocusBtn" type="button">коммент</button>
        <button class="action" id="repostBtn" type="button">репост в океан</button>
        <button class="action" id="sourceBtn" type="button">источник</button>
      </div>

      <div class="comments-title" id="commentsTitle">Комментарии</div>
      <div class="comments" id="comments"></div>

      <div class="comment-row">
        <textarea id="commentInput" maxlength="120" placeholder="Написать под этой информацией..."></textarea>
        <button class="send" id="sendCommentBtn" type="button">Отпр.</button>
      </div>
    </div>
  </div>

  <div class="modal" id="profileModal">
    <div class="profile-panel">
      <div class="profile-head">
        <div class="avatar" id="profileAvatar">?</div>
        <div class="profile-name">
          <div class="nick" id="profileNick">@user</div>
          <div class="meta" id="profileMeta">0 подписчиков · 0 постов</div>
        </div>
        <button class="follow" id="profileFollowBtn" type="button">Подписаться</button>
        <button class="modal-close" id="closeProfileBtn" type="button">×</button>
      </div>
      <div class="profile-bio" id="profileBio"></div>
      <div class="comments-title">Посты пользователя</div>
      <div class="profile-posts" id="profilePosts"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <div class="vignette"></div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

    const app = document.getElementById('app');
    const createBtn = document.getElementById('createBtn');
    const composer = document.getElementById('composer');
    const postInput = document.getElementById('postInput');
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const sendPostBtn = document.getElementById('sendPostBtn');
    const closeComposerBtn = document.getElementById('closeComposerBtn');
    const liveBtn = document.getElementById('liveBtn');
    const buildBeaconBtn = document.getElementById('buildBeaconBtn');
    const randomPostBtn = document.getElementById('randomPostBtn');
    const trendBtn = document.getElementById('trendBtn');
    const liveCountEl = document.getElementById('liveCount');
    const followCountEl = document.getElementById('followCount');
    const postCountEl = document.getElementById('postCount');
    const energyCountEl = document.getElementById('energyCount');
    const beaconLevelEl = document.getElementById('beaconLevel');
    const toast = document.getElementById('toast');

    const postModal = document.getElementById('postModal');
    const postAvatar = document.getElementById('postAvatar');
    const postNick = document.getElementById('postNick');
    const postMeta = document.getElementById('postMeta');
    const postFollowBtn = document.getElementById('postFollowBtn');
    const closePostBtn = document.getElementById('closePostBtn');
    const postBody = document.getElementById('postBody');
    const postImage = document.getElementById('postImage');
    const likeBtn = document.getElementById('likeBtn');
    const commentFocusBtn = document.getElementById('commentFocusBtn');
    const repostBtn = document.getElementById('repostBtn');
    const sourceBtn = document.getElementById('sourceBtn');
    const commentsTitle = document.getElementById('commentsTitle');
    const comments = document.getElementById('comments');
    const commentInput = document.getElementById('commentInput');
    const sendCommentBtn = document.getElementById('sendCommentBtn');

    const profileModal = document.getElementById('profileModal');
    const profileAvatar = document.getElementById('profileAvatar');
    const profileNick = document.getElementById('profileNick');
    const profileMeta = document.getElementById('profileMeta');
    const profileFollowBtn = document.getElementById('profileFollowBtn');
    const closeProfileBtn = document.getElementById('closeProfileBtn');
    const profileBio = document.getElementById('profileBio');
    const profilePosts = document.getElementById('profilePosts');

    let selectedImageData = null;
    let selectedPost = null;
    let selectedUser = null;
    let nextPostId = 1;
    let selectedImagePreviewText = '';
    let trendPower = 0;
    let trendTimer = 0;
    let liveLoadedCount = 0;
    let liveLoading = false;
    let lastLiveFetchAt = 0;

    const followed = new Set();
    const liked = new Set();
    const disliked = new Set();

    const preferenceScores = {
      photo: 0,
      meme: 0,
      news: 0,
      ai: 0,
      ocean: 0,
      social: 0,
      work: 0,
      weird: 0
    };

    let energy = 0;
    let beaconLevel = 0;
    let beaconGroup = null;
    let preferenceSpawnTimer = 7;
    let swipeStart = null;

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x06131d, 0.0215);

    const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 900);
    camera.position.set(0, 7.4, 14);

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      powerPreference: 'high-performance',
      alpha: false
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.75));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x02050a, 1);
    app.appendChild(renderer.domElement);

    scene.add(new THREE.HemisphereLight(0x7edcff, 0x031018, 1.65));

    const moon = new THREE.DirectionalLight(0xc7f5ff, 2.1);
    moon.position.set(-8, 16, 10);
    scene.add(moon);

    const glow = new THREE.PointLight(0x7ce6ff, 21, 95);
    scene.add(glow);

    // Sky
    const skyGeo = new THREE.SphereGeometry(430, 32, 16);
    const skyMat = new THREE.ShaderMaterial({
      side: THREE.BackSide,
      uniforms: { time: { value: 0 }, trend: { value: 0 } },
      vertexShader: `
        varying vec3 vWorld;
        void main() {
          vec4 w = modelMatrix * vec4(position, 1.0);
          vWorld = w.xyz;
          gl_Position = projectionMatrix * viewMatrix * w;
        }
      `,
      fragmentShader: `
        varying vec3 vWorld;
        uniform float time;
        uniform float trend;

        float hash(vec2 p) {
          return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
        }

        void main() {
          float h = normalize(vWorld).y;
          vec3 top = mix(vec3(0.014, 0.04, 0.075), vec3(0.085, 0.025, 0.075), trend * 0.65);
          vec3 low = mix(vec3(0.004, 0.014, 0.024), vec3(0.018, 0.008, 0.018), trend * 0.60);
          vec3 col = mix(low, top, smoothstep(-0.15, 0.85, h));

          vec2 p = normalize(vWorld).xz * 82.0;
          float stars = step(0.996, hash(floor(p)));
          stars *= smoothstep(0.06, 0.72, h);
          stars *= 0.45 + 0.55 * sin(time * (0.7 + trend * 2.0) + hash(floor(p)) * 20.0);

          float glitch = step(0.985, hash(floor(p * 0.25 + time))) * trend;
          col += vec3(stars) * 0.85;
          col += vec3(0.0, 0.18, 0.22) * pow(max(0.0, 1.0 - abs(h - 0.05) * 5.0), 2.0) * 0.28;
          col += vec3(1.0, 0.3, 0.75) * glitch * 0.18;
          gl_FragColor = vec4(col, 1.0);
        }
      `
    });
    const sky = new THREE.Mesh(skyGeo, skyMat);
    scene.add(sky);

    // Water
    const waterUniforms = {
      time: { value: 0 },
      offset: { value: new THREE.Vector2(0, 0) },
      cameraPos: { value: new THREE.Vector3() },
      trend: { value: 0 }
    };

    const waterGeo = new THREE.PlaneGeometry(580, 580, 190, 190);
    const waterMat = new THREE.ShaderMaterial({
      uniforms: waterUniforms,
      vertexShader: `
        uniform float time;
        uniform vec2 offset;
        uniform float trend;
        varying float vWave;
        varying vec3 vWorld;

        float waveHeight(float x, float z) {
          float s = 1.0 + trend * 0.75;
          float h = 0.0;
          h += sin(x * 0.115 + time * 0.95 * s) * 0.34;
          h += sin(z * 0.095 - time * 0.70 * s) * 0.28;
          h += sin((x + z) * 0.062 + time * 0.45 * s) * 0.45;

    function getForwardRight() {
      const forward = new THREE.Vector3(
        Math.sin(yaw) * Math.cos(pitch),
        Math.sin(pitch),
        Math.cos(yaw) * Math.cos(pitch)
      ).normalize();

      const flatForward = new THREE.Vector3(forward.x, 0, forward.z).normalize();
      const right = new THREE.Vector3(flatForward.z, 0, -flatForward.x).normalize();

      return { forward, flatForward, right };
    }

    function updatePlayer(dt, t) {
      const { forward, flatForward, right } = getForwardRight();
      const move = new THREE.Vector3();

      if (keys.has('KeyW') || keys.has('ArrowUp')) move.add(flatForward);
      if (keys.has('KeyS') || keys.has('ArrowDown')) move.sub(flatForward);
      if (keys.has('KeyD') || keys.has('ArrowRight')) move.add(right);
      if (keys.has('KeyA') || keys.has('ArrowLeft')) move.sub(right);

      if (move.lengthSq() > 0) {
        move.normalize().multiplyScalar(19 * dt);
        player.target.x += move.x;
        player.target.y += move.z;
      }

      const smooth = 1 - Math.pow(0.001, dt);
      player.pos.lerp(player.target, smooth);

      camera.position.set(player.pos.x, player.height + Math.sin(t * 0.9) * 0.08, player.pos.y);
      camera.lookAt(new THREE.Vector3().copy(camera.position).add(forward));

      glow.position.set(player.pos.x, camera.position.y + 4, player.pos.y);
    }

    function makeTextSprite(text, style = {}) {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const size = style.size || 30;
      const maxChars = style.maxChars || 220;
      const safeText = String(text).trim().slice(0, maxChars) || '...';

      const tempCtx = temp.getContext('2d');
      tempCtx.font = `800 ${size * dpr}px Arial, sans-serif`;

      const maxWidth = (style.maxWidth || 780) * dpr;
      const lines = splitLines(tempCtx, safeText, maxWidth, style.maxLines || 4);
      const textWidth = Math.max(...lines.map(l => tempCtx.measureText(l).width), 120 * dpr);
      const width = Math.min(1200, Math.max((style.minWidth || 220) * dpr, textWidth + 70 * dpr));
      const height = (style.height || (70 + lines.length * 38)) * dpr;

      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');

      const grad = ctx.createLinearGradient(0, 0, width, height);
      grad.addColorStop(0, style.bg1 || 'rgba(255,255,255,0.97)');
      grad.addColorStop(1, style.bg2 || 'rgba(174,255,231,0.90)');

      roundRect(ctx, 6 * dpr, 8 * dpr, width - 12 * dpr, height - 16 * dpr, (style.radius || 24) * dpr);
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.lineWidth = 2 * dpr;
      ctx.strokeStyle = style.stroke || 'rgba(124,255,220,0.75)';
      ctx.stroke();

      ctx.shadowColor = style.glow || 'rgba(0,255,220,0.72)';
      ctx.shadowBlur = 14 * dpr;
      ctx.font = `800 ${size * dpr}px Arial, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = style.fg || 'rgba(2,18,27,0.96)';

      const lineHeight = size * dpr * 1.12;
      const startY = height / 2 - (lines.length - 1) * lineHeight * 0.5;
      lines.forEach((line, i) => ctx.fillText(line, width / 2, startY + i * lineHeight));

      if (style.badge) {
        ctx.shadowBlur = 0;
        ctx.font = `700 ${10 * dpr}px Arial, sans-serif`;
        ctx.fillStyle = style.badgeColor || 'rgba(2,18,27,0.42)';

      const texture = new THREE.CanvasTexture(canvas);

      const mat = new THREE.SpriteMaterial({ map: texture, transparent: true, depthWrite: false });

      sprite.userData.aspect = width / height;
      sprite.userData.text = safeText;

    function makeImageCanvas(dataUrl, callback) {
      const img = new Image();
      img.onload = () => {
        const maxSide = 900;
        const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
        const canvas = document.createElement('canvas');
        canvas.width = Math.max(1, Math.floor(img.width * scale));
        canvas.height = Math.max(1, Math.floor(img.height * scale));
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        callback(canvas);
      };
      img.src = dataUrl;
    }

    function makeExternalPhotoCanvas(url, callback) {
      const img = new Image();
      img.crossOrigin = 'anonymous';

      img.onload = () => {
        try {
          const maxSide = 900;
          const scale = Math.min(1, maxSide / Math.max(img.naturalWidth || img.width, img.naturalHeight || img.height));
          const canvas = document.createElement('canvas');
          canvas.width = Math.max(1, Math.floor((img.naturalWidth || img.width) * scale));
          canvas.height = Math.max(1, Math.floor((img.naturalHeight || img.height) * scale));
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          callback(canvas, url);
        } catch (err) {
          callback(makeFallbackPhotoCanvas(url), null);
        }
      };

      img.onerror = () => callback(makeFallbackPhotoCanvas(url), null);
      img.src = url;
    }

      for (let i = 0; i < 36; i++) {
        ctx.beginPath();
        const y = 140 + i * 26;
        for (let x = 0; x <= canvas.width; x += 24) {
          const yy = y + Math.sin(x * 0.018 + i * 0.8) * 18;
          if (x === 0) ctx.moveTo(x, yy);
          else ctx.lineTo(x, yy);
        }
        ctx.strokeStyle = `rgba(124, 230, 255, ${0.08 + i * 0.002})`;
        ctx.lineWidth = 4;
        ctx.stroke();
      }

      ctx.fillStyle = 'rgba(255,255,255,0.88)';
      ctx.font = '900 54px Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('PHOTO', canvas.width / 2, canvas.height / 2 - 30);

      ctx.fillStyle = 'rgba(255,255,255,0.48)';
      ctx.font = '700 28px Arial, sans-serif';
      ctx.fillText('external image fallback', canvas.width / 2, canvas.height / 2 + 22);

      ctx.font = '600 22px Arial, sans-serif';
      ctx.fillText(String(seed).slice(0, 44), canvas.width / 2, canvas.height / 2 + 64);

      return canvas;
    }

    function splitLines(ctx, text, maxWidth, maxLines) {
      const words = String(text).split(/\s+/).filter(Boolean);
      const lines = [];
      let line = '';

      for (const word of words) {
        const test = line ? line + ' ' + word : word;
        if (ctx.measureText(test).width > maxWidth && line) {
          lines.push(line);
          line = word;
          if (lines.length >= maxLines - 1) break;
        } else {
          line = test;
        }
      }

      const usedWords = lines.join(' ').split(/\s+/).filter(Boolean).length;
      const rest = words.slice(usedWords).join(' ');
      if (rest) line = rest;
      if (line) lines.push(line);

      if (lines.length > maxLines) lines.length = maxLines;

      const shown = lines.join(' ');
      const all = words.join(' ');
      if (shown.length < all.length && lines.length) {
        lines[lines.length - 1] = lines[lines.length - 1].slice(0, Math.max(0, lines[lines.length - 1].length - 1)) + '…';
      }

      return lines.length ? lines : ['...'];
    }

    function wrapText(ctx, text, x, y, maxWidth, lineHeight, maxLines) {
      const words = String(text).split(/\s+/).filter(Boolean);
      let line = '';
      const lines = [];

      for (const word of words) {
        const test = line ? line + ' ' + word : word;
        if (ctx.measureText(test).width > maxWidth && line) {
          lines.push(line);
          line = word;
          if (lines.length >= maxLines - 1) break;
        } else {
          line = test;
        }
      }

      const usedWords = lines.join(' ').split(/\s+/).filter(Boolean).length;
      const rest = words.slice(usedWords).join(' ');
      if (rest) line = rest;
      if (line) lines.push(line);
      if (lines.length > maxLines) lines.length = maxLines;

      const start = y - (lines.length - 1) * lineHeight * 0.5;
      lines.forEach((l, i) => ctx.fillText(l, x, start + i * lineHeight));
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function cut(text, n = 70) {
      const s = String(text || '').replace(/\s+/g, ' ').trim();
      return s.length > n ? s.slice(0, n - 1) + '…' : s;
    }

    async function fetchJson(url, timeoutMs = 9000) {
      const ctrl = new AbortController();
      const timeout = setTimeout(() => ctrl.abort(), timeoutMs);

      try {
        const res = await fetch(url, {
          signal: ctrl.signal,
          headers: { 'Accept': 'application/json' }
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return await res.json();
      } finally {
        clearTimeout(timeout);
      }
    }

    function analyzeTags(text, hasImage = false) {
      const s = String(text || '').toLowerCase();
      const tags = [];

      if (hasImage) tags.push('photo');
      if (/мем|кринж|ахах|лол|pov|trend|тренд|вирус/i.test(s)) tags.push('meme');
      if (/news|breaking|новост|источник|обновлен|срочно/i.test(s)) tags.push('news');
      if (/ai|нейро|prompt|алгоритм|summary|модель/i.test(s)) tags.push('ai');
      if (/океан|вода|плыв|лента|поток|контент|дрейф/i.test(s)) tags.push('ocean');
      if (/подпис|профиль|пользователь|лайк|коммент|соц/i.test(s)) tags.push('social');
      if (/работ|карьер|созвон|продуктив|деньг|портфолио/i.test(s)) tags.push('work');
      if (!tags.length) tags.push('weird');

      return [...new Set(tags)];
    }

    function updatePreferences(post, amount) {
      if (!post) return;

      for (const tag of post.tags || []) {
        preferenceScores[tag] = (preferenceScores[tag] || 0) + amount;
        preferenceScores[tag] = Math.max(-8, Math.min(18, preferenceScores[tag]));
      }
    }

    function bestPreferenceTag() {
      let best = 'ocean';
      let score = -999;

      for (const [tag, value] of Object.entries(preferenceScores)) {
        const jitter = Math.random() * 0.8;
        if (value + jitter > score) {
          score = value + jitter;
          best = tag;
        }
      }

      if (score <= 0.5) {
        const neutral = ['ocean', 'meme', 'photo', 'weird'];
        return neutral[Math.floor(Math.random() * neutral.length)];
      }

      return best;
    }

    function spawnPreferredContent(count = 1) {
      if (!users.length) return;

      for (let i = 0; i < count; i++) {
        const tag = bestPreferenceTag();
        const u = users[Math.floor(Math.random() * users.length)];
        const angle = Math.random() * Math.PI * 2;
        const radius = 10 + Math.random() * (beaconLevel ? 18 : 28);
        const x = player.pos.x + Math.cos(angle) * radius;
        const z = player.pos.y + Math.sin(angle) * radius;

        if (tag === 'photo' || Math.random() < Math.max(0.12, (preferenceScores.photo || 0) * 0.035)) {
          createPhotoPost({
            user: u,
            x,
            z,
            url: samplePhotoUrls[Math.floor(Math.random() * samplePhotoUrls.length)],

          });

          });
        }
      }
    }

    function doLike(post, source = 'button') {
      if (!post) return;

      if (!liked.has(post.id)) {
        liked.add(post.id);
        disliked.delete(post.id);
        post.likes++;
        energy += 1;
        updatePreferences(post, 2);
        post.highlight = 1.5;
        refreshPostTexture(post);

        if (source === 'swipe') showToast('Свайп вправо: нравится. Океан запомнил вкус.');
        else showToast('Океан запомнил, что тебе это нравится.');

        spawnPreferredContent(beaconLevel > 1 ? 2 : 1);
      } else if (source !== 'swipe') {
        liked.delete(post.id);
        post.likes = Math.max(0, post.likes - 1);
        updatePreferences(post, -1);
        refreshPostTexture(post);
      }

      updateStats();
    }

    function doDislike(post, source = 'button') {
      if (!post) return;

      disliked.add(post.id);
      liked.delete(post.id);
      updatePreferences(post, -2);
      post.highlight = 0;
      post.x += (Math.random() - 0.5) * 90;

    function closePostWithGesture(direction = 'up') {
      const panel = document.querySelector('.post-panel');
      if (panel) {
        panel.classList.remove('swipe-right', 'swipe-left', 'swipe-up');
        panel.classList.add(direction === 'right' ? 'swipe-right' : direction === 'left' ? 'swipe-left' : 'swipe-up');
        setTimeout(() => {
          panel.classList.remove('swipe-right', 'swipe-left', 'swipe-up');
          postModal.classList.remove('show');
        }, 170);
      } else {
        postModal.classList.remove('show');
      }
    }

    function setupPostSwipeGestures() {
      const panel = document.querySelector('.post-panel');
      if (!panel) return;

      panel.addEventListener('pointerdown', (e) => {
        if (e.target.closest('button, textarea, .nick')) return;
        swipeStart = {
          x: e.clientX,
          y: e.clientY,
          t: performance.now()
        };
      });

      panel.addEventListener('pointermove', (e) => {
        if (!swipeStart) return;

        const dx = e.clientX - swipeStart.x;
        const dy = e.clientY - swipeStart.y;

        panel.classList.toggle('swipe-right', dx > 45 && Math.abs(dx) > Math.abs(dy));
        panel.classList.toggle('swipe-left', dx < -45 && Math.abs(dx) > Math.abs(dy));
        panel.classList.toggle('swipe-up', dy < -45 && Math.abs(dy) > Math.abs(dx));
      });

      panel.addEventListener('pointerup', (e) => {
        if (!swipeStart) return;

        const dx = e.clientX - swipeStart.x;
        const dy = e.clientY - swipeStart.y;
        const dt = performance.now() - swipeStart.t;
        swipeStart = null;

        panel.classList.remove('swipe-right', 'swipe-left', 'swipe-up');

        if (dt < 900 && dx > 85 && Math.abs(dx) > Math.abs(dy) * 1.15) {
          doLike(selectedPost, 'swipe');
          closePostWithGesture('right');
          return;
        }

        if (dt < 900 && dx < -85 && Math.abs(dx) > Math.abs(dy) * 1.15) {
          doDislike(selectedPost, 'swipe');
          return;
        }

        if (dt < 900 && dy < -85 && Math.abs(dy) > Math.abs(dx) * 1.05) {
          showToast('Свайп вверх: пост закрыт.');
          closePostWithGesture('up');
        }
      });

      panel.addEventListener('pointercancel', () => {
        swipeStart = null;
        panel.classList.remove('swipe-right', 'swipe-left', 'swipe-up');
      });
    }

    function updatePreferenceSpawns(dt) {
      preferenceSpawnTimer -= dt * (1 + beaconLevel * 0.42);

      if (preferenceSpawnTimer <= 0) {
        const hasTaste = Object.values(preferenceScores).some(v => v > 1);
        if (hasTaste) spawnPreferredContent(1 + (beaconLevel >= 3 ? 1 : 0));
        preferenceSpawnTimer = Math.max(5.5, 14 - beaconLevel * 2.2);
      }
    }

          emissive: 0x00ffd0,
          emissiveIntensity: 0.9,
          roughness: 0.25,
          metalness: 0.22
        })
      );
      core.position.y = 1.25;
      group.add(core);

      const ring1 = new THREE.Mesh(
        new THREE.TorusGeometry(1.65, 0.045, 8, 80),
        new THREE.MeshBasicMaterial({ color: 0x9cf7ff, transparent: true, opacity: 0.72 })
      );
      ring1.rotation.x = Math.PI / 2;
      ring1.position.y = 1.25;
      group.add(ring1);

      const ring2 = new THREE.Mesh(
        new THREE.TorusGeometry(2.15, 0.035, 8, 80),
        new THREE.MeshBasicMaterial({ color: 0xff83c7, transparent: true, opacity: 0.48 })
      );
      ring2.rotation.x = Math.PI / 2;
      ring2.position.y = 1.70;
      group.add(ring2);

      group.userData = { base, core, ring1, ring2 };
      return group;
    }

    function buildOrUpgradeBeacon() {
      const cost = beaconLevel === 0 ? 3 : 3 + beaconLevel * 2;

      if (energy < cost) {
        showToast('Нужно ' + cost + ' энергии. Лайкай посты или комментируй, чтобы строить.');
        return;
      }

      energy -= cost;
      beaconLevel += 1;

      if (!beaconGroup) {
        beaconGroup = createBeaconMesh();
        beaconGroup.position.set(player.pos.x + 5, 0, player.pos.y + 5);
        scene.add(beaconGroup);
        showToast('Маяк вкуса построен. Он притягивает похожий контент и пользователей.');
      } else {
        const s = 1 + beaconLevel * 0.18;
        beaconGroup.scale.setScalar(s);
        showToast('Маяк улучшен до уровня ' + beaconLevel + '. Лента вокруг тебя станет точнее.');
      }

      spawnPreferredContent(2 + Math.min(3, beaconLevel));
      updateStats();
    }

    function updateBeacon(t) {
      if (!beaconGroup) return;

      const x = beaconGroup.position.x;
      const z = beaconGroup.position.z;
      beaconGroup.position.y = waveHeight(x, z, t) + 0.42;
      beaconGroup.userData.core.rotation.y += 0.018 + beaconLevel * 0.004;
      beaconGroup.userData.core.rotation.x = Math.sin(t * 1.2) * 0.24;
      beaconGroup.userData.ring1.rotation.z += 0.012 + beaconLevel * 0.002;
      beaconGroup.userData.ring2.rotation.z -= 0.009 + beaconLevel * 0.002;

      const pulse = 1 + Math.sin(t * 2.1) * 0.04;
      beaconGroup.userData.core.scale.setScalar(pulse);

      // Pull users slightly toward your beacon, making it feel socially attractive.
      for (const user of users) {
        if (user.nick === 'you') continue;
        const d = Math.hypot(user.x - x, user.z - z);
        if (d < 75 + beaconLevel * 20 && Math.random() < 0.0035 * beaconLevel) {
          user.tx = x + (Math.random() - 0.5) * 12;
          user.tz = z + (Math.random() - 0.5) * 12;
        }
      }
    }

    function updateStats() {
      liveCountEl.textContent = liveLoadedCount;
      followCountEl.textContent = followed.size;
      postCountEl.textContent = posts.length;
      energyCountEl.textContent = energy;
      beaconLevelEl.textContent = beaconLevel;
      buildBeaconBtn.classList.toggle('active', beaconLevel > 0);
    }

    function updateUsers(dt, t) {
      for (const user of users) {
        user.nextPostTimer -= dt * (1 + trendPower * 0.9);

        if (user.nextPostTimer <= 0) {
          user.nextPostTimer = 12 + Math.random() * 22;
          if (Math.random() < 0.72) {
            const x = user.x + (Math.random() - 0.5) * 5;
            const z = user.z + (Math.random() - 0.5) * 5;

            if (Math.random() < 0.42) {
              createPhotoPost({
                user,
                x,
                z,
                url: samplePhotoUrls[Math.floor(Math.random() * samplePhotoUrls.length)],
                caption: photoCaptions[Math.floor(Math.random() * photoCaptions.length)]
              });
            } else {
              createPost({
                text: samplePosts[Math.floor(Math.random() * samplePosts.length)],
                user,
                x,
                z
              });
            }
          }
        }

        if (!user.targetPost || Math.random() < dt * 0.08) {
          user.targetPost = posts.length ? posts[Math.floor(Math.random() * posts.length)] : null;
        }

        if (user.targetPost && Math.random() < 0.74) {
          user.tx = user.targetPost.x + Math.sin(t + user.seed) * 4.4;
          user.tz = user.targetPost.z + Math.cos(t * 0.9 + user.seed) * 4.4;
        } else {
          user.tx += (Math.random() - 0.5) * dt * 7;
          user.tz += (Math.random() - 0.5) * dt * 7;
        }

        // Sometimes approach player like social pressure.
        if (Math.random() < dt * 0.018) {
          const a = Math.random() * Math.PI * 2;
          const d = 6 + Math.random() * 13;
          user.tx = player.pos.x + Math.cos(a) * d;
          user.tz = player.pos.y + Math.sin(a) * d;
        }

        // If you build a taste beacon, users start drifting toward it.
        if (beaconGroup && Math.random() < dt * (0.018 + beaconLevel * 0.012)) {
          user.tx = beaconGroup.position.x + (Math.random() - 0.5) * (20 - Math.min(12, beaconLevel * 2));
          user.tz = beaconGroup.position.z + (Math.random() - 0.5) * (20 - Math.min(12, beaconLevel * 2));
        }

        const dx = user.tx - user.x;
        const dz = user.tz - user.z;
        const dist = Math.hypot(dx, dz);
        const speed = 2.6 + trendPower * 1.2;

        if (dist > 0.2) {
          const desiredVx = (dx / dist) * speed;
          const desiredVz = (dz / dist) * speed;
          user.vx += (desiredVx - user.vx) * Math.min(1, dt * 1.4);
          user.vz += (desiredVz - user.vz) * Math.min(1, dt * 1.4);
        } else {
          user.vx *= 0.92;
          user.vz *= 0.92;
        }

        // Separate users
        for (const other of users) {
          if (other === user) continue;
          const ox = user.x - other.x;
          const oz = user.z - other.z;
          const od = Math.hypot(ox, oz);
          if (od > 0.001 && od < 5.2) {
            const push = (5.2 - od) * 0.35;
            user.vx += (ox / od) * push * dt;
            user.vz += (oz / od) * push * dt;
          }
        }

        const sp = Math.hypot(user.vx, user.vz);
        const limit = 3.9 + trendPower * 1.6;
        if (sp > limit) {
          user.vx = (user.vx / sp) * limit;
          user.vz = (user.vz / sp) * limit;
        }

        user.x += user.vx * dt;
        user.z += user.vz * dt;

        const y = waveHeight(user.x, user.z, t) + 0.92 + Math.sin(t * 1.2 + user.seed) * 0.12;
        user.group.position.set(user.x, y, user.z);
        user.body.rotation.y += dt * 0.5;
        user.body.rotation.z = Math.sin(t * 1.3 + user.seed) * 0.11;
        user.halo.rotation.z += dt * 0.42;

        if (sp > 0.05) user.group.rotation.y = Math.atan2(user.vx, user.vz);

        if (Math.hypot(user.x - player.pos.x, user.z - player.pos.y) > 170) {
          const a = Math.random() * Math.PI * 2;
          const d = 55 + Math.random() * 50;
          user.x = player.pos.x + Math.cos(a) * d;
          user.z = player.pos.y + Math.sin(a) * d;
          user.tx = user.x + (Math.random() - 0.5) * 20;
          user.tz = user.z + (Math.random() - 0.5) * 20;
        }
      }
    }

    function updatePosts(dt, t) {
      for (let i = posts.length - 1; i >= 0; i--) {
        const p = posts[i];
        p.age += dt;

        const currentX = Math.sin(t * 0.25 + p.seed) * 0.06 + Math.sin((p.z + t) * 0.025) * 0.038;
        const currentZ = Math.cos(t * 0.22 + p.seed * 1.7) * 0.06 + Math.cos((p.x - t) * 0.023) * 0.038;
        p.vx += (currentX + Math.sin(t + p.seed) * trendPower * 0.11) * dt;
        p.vz += (currentZ + Math.cos(t + p.seed) * trendPower * 0.11) * dt;

        const speed = Math.hypot(p.vx, p.vz);
        const maxSpeed = 2.2 + trendPower * 1.7;
        if (speed > maxSpeed) {
          p.vx = (p.vx / speed) * maxSpeed;
          p.vz = (p.vz / speed) * maxSpeed;
        }

        p.vx *= 0.997;
        p.vz *= 0.997;
        p.x += p.vx * dt;
        p.z += p.vz * dt;

        p.highlight = Math.max(0, p.highlight - dt * 0.7);

        const y = waveHeight(p.x, p.z, t) + 1.85 + Math.sin(t * 1.6 + p.seed) * 0.16;
        p.sprite.position.set(p.x, y + p.highlight * 0.32, p.z);
        p.sprite.material.opacity = 0.84 + p.highlight * 0.16;

        const d = Math.hypot(p.x - player.pos.x, p.z - player.pos.y);
        if (d < 8 && p.openCount === 0 && Math.random() < dt * 0.18) {
          p.highlight = 1;
        }

        if (d > 235 && posts.length > 28) {
          removePost(p);
        }
      }

      // Soft post collisions
      for (let i = 0; i < posts.length; i++) {
        for (let j = i + 1; j < posts.length; j++) {
          const a = posts[i];
          const b = posts[j];
          const dx = b.x - a.x;
          const dz = b.z - a.z;
          const dist = Math.hypot(dx, dz);
          const min = 6.5;
          if (dist > 0.001 && dist < min) {
            const nx = dx / dist;
            const nz = dz / dist;
            const push = (min - dist) * 0.5;
            a.x -= nx * push;
            a.z -= nz * push;
            b.x += nx * push;
            b.z += nz * push;
            a.vx -= nx * 0.08;
            a.vz -= nz * 0.08;
            b.vx += nx * 0.08;
            b.vz += nz * 0.08;
          }
        }
      }
    }

    function removePost(p) {
      const idx = posts.indexOf(p);
      if (idx >= 0) posts.splice(idx, 1);

      const userIdx = p.user.posts.indexOf(p);
      if (userIdx >= 0) p.user.posts.splice(userIdx, 1);

      const clickIdx = clickableObjects.indexOf(p.sprite);
      if (clickIdx >= 0) clickableObjects.splice(clickIdx, 1);

      scene.remove(p.sprite);
      if (p.sprite.material.map) p.sprite.material.map.dispose();
      p.sprite.material.dispose();
      updateStats();
    }

    function spawnRipple(x, z, color = 0x9cf7ff) {
      const geo = new THREE.RingGeometry(0.45, 0.52, 64);
      const mat = new THREE.MeshBasicMaterial({
        color,
        transparent: true,
        opacity: 0.42,
        side: THREE.DoubleSide,
        depthWrite: false
      });
      const ring = new THREE.Mesh(geo, mat);
      ring.rotation.x = -Math.PI / 2;
      ring.position.set(x, 0.04, z);
      scene.add(ring);
      ripples.push({ ring, age: 0 });
    }

    function updateRipples(dt, t) {
      for (let i = ripples.length - 1; i >= 0; i--) {
        const r = ripples[i];
        r.age += dt;
        const s = 1 + r.age * 8.5;
        r.ring.scale.setScalar(s);
        r.ring.material.opacity = Math.max(0, 0.42 * (1 - r.age / 1.3));
        r.ring.position.y = waveHeight(r.ring.position.x, r.ring.position.z, t) + 0.05;

        if (r.age > 1.3) {
          scene.remove(r.ring);
          r.ring.geometry.dispose();
          r.ring.material.dispose();
          ripples.splice(i, 1);
        }
      }
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, (m) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      })[m]);
    }

    function updateTrend(dt) {
      if (trendTimer > 0) {
        trendTimer -= dt;
        trendPower += (1 - trendPower) * Math.min(1, dt * 1.2);
      } else {
        trendPower += (0 - trendPower) * Math.min(1, dt * 1.0);
      }

      scene.fog.density += ((0.0215 + trendPower * 0.008) - scene.fog.density) * Math.min(1, dt * 1.3);
    }

    function seedWorld() {
      const you = createUser('you', 0, 0, {
        followers: 1,
        bio: 'ты плаваешь внутри собственной ленты',
        color: new THREE.Color(0x7ce6ff)
      });
      you.group.visible = false;

      for (let i = 0; i < botNames.length; i++) {
        const a = (i / botNames.length) * Math.PI * 2 + Math.random() * 0.4;
        const d = 18 + Math.random() * 68;
        const color = new THREE.Color().setHSL((i / botNames.length + 0.08) % 1, 0.74, 0.62);
        const u = createUser(botNames[i], Math.cos(a) * d, Math.sin(a) * d, {
          followers: Math.floor(30 + Math.random() * 9000),
          bio: botBios[i % botBios.length],
          color
        });

        for (let j = 0; j < 1 + Math.floor(Math.random() * 2); j++) {
          const x = u.x + (Math.random() - 0.5) * 8;
          const z = u.z + (Math.random() - 0.5) * 8;

          if ((i + j) % 3 === 0) {
            createPhotoPost({
              user: u,
              x,
              z,
              url: samplePhotoUrls[(i + j) % samplePhotoUrls.length],
              caption: photoCaptions[(i + j) % photoCaptions.length]
            });
          } else {
            createPost({
              text: samplePosts[(i + j * 3) % samplePosts.length],
              user: u,
              x,
              z
            });
          }
        }
      }

      showToast('Сейчас подтяну реальные открытые источники: HN, Wikipedia, погода, crypto, GitHub.');
      updateStats();
      setTimeout(() => loadLiveFeeds(), 900);
    }

    function animate() {
      const dt = Math.min(clock.getDelta(), 0.033);
      const t = clock.elapsedTime;

      updateTrend(dt);
      updatePlayer(dt, t);
      updateAvatar(t, dt);
      updateUsers(dt, t);
      updatePosts(dt, t);
      updatePreferenceSpawns(dt);
      updateBeacon(t);
      updateRipples(dt, t);

      water.position.x = camera.position.x;
      water.position.z = camera.position.z;
      waterUniforms.time.value = t;
      waterUniforms.offset.value.set(water.position.x, water.position.z);
      waterUniforms.cameraPos.value.copy(camera.position);
      waterUniforms.trend.value = trendPower;

      sky.position.copy(camera.position);
      skyMat.uniforms.time.value = t;
      skyMat.uniforms.trend.value = trendPower;

      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    function resize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.75));
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    window.addEventListener('resize', resize);

    seedWorld();
    animate();
  </script>
</body>
</html>
