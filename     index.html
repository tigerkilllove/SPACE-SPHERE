<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<meta name="apple-touch-fullscreen" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>SPACE FIGHTER</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;}
body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);font-family:'Courier New',monospace;user-select:none;-webkit-user-select:none;}
canvas{display:block;position:absolute;inset:0;width:100%;height:100%;}

/* SCREENS */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:radial-gradient(ellipse at 50% 40%,#00001f 0%,#000 100%);}
.screen.hidden{display:none;}
.title{font-size:clamp(30px,9vw,58px);font-weight:900;color:#fff;letter-spacing:5px;text-transform:uppercase;text-shadow:0 0 30px #3366ff,0 0 60px #1133cc,0 0 100px #0011aa;margin-bottom:6px;text-align:center;animation:titlePulse 2s ease-in-out infinite alternate;}
@keyframes titlePulse{from{text-shadow:0 0 20px #3366ff,0 0 40px #1133cc;}to{text-shadow:0 0 40px #4488ff,0 0 80px #2244dd,0 0 120px #0022bb;}}
.subtitle{font-size:clamp(10px,3vw,13px);color:#3355aa;letter-spacing:4px;margin-bottom:36px;}
.btn{background:transparent;border:1px solid #3366ff;color:#aaccff;font-family:'Courier New',monospace;font-size:clamp(12px,3.8vw,16px);letter-spacing:3px;text-transform:uppercase;padding:13px 30px;border-radius:2px;cursor:pointer;margin:6px;min-width:195px;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;transition:all 0.15s;}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 40%,rgba(51,102,255,0.08));pointer-events:none;}
.btn:active{background:rgba(51,102,255,0.25);border-color:#4488ff;}
.btn.primary{border-color:#4488ff;color:#fff;border-width:2px;box-shadow:0 0 20px rgba(51,102,255,0.5),inset 0 0 20px rgba(51,102,255,0.05);}
.score-display{font-size:clamp(38px,11vw,66px);color:#fff;font-weight:900;text-shadow:0 0 24px #3366ff;margin:8px 0;}
.score-label{font-size:clamp(9px,2.5vw,12px);color:#334488;letter-spacing:3px;text-transform:uppercase;margin-bottom:3px;}
.best-display{font-size:clamp(16px,4.5vw,26px);color:#2255cc;margin-bottom:22px;text-shadow:0 0 10px #1133cc;}
.bot-report-title{font-size:10px;color:#44ff88;letter-spacing:2px;margin:4px 0 6px;text-transform:uppercase;}
#botReport{
  width:min(86%,360px);height:130px;resize:none;
  background:rgba(0,6,20,0.78);border:1px solid rgba(68,255,136,0.35);
  color:#b9ffd4;font-family:'Courier New',monospace;font-size:10px;line-height:1.35;
  padding:8px;outline:none;box-shadow:0 0 14px rgba(68,255,136,0.16);
}
#copyReportBtn{min-width:150px;padding:9px 18px;font-size:10px;margin-top:8px;}
#botModeLabel{font-size:10px;color:#44ff88;letter-spacing:2px;margin-top:10px;text-shadow:0 0 10px #00ff66;}
#playerNameInput{
  width:min(72%,260px);
  margin-top:22px;
  padding:10px 12px;
  border:1px solid rgba(68,255,136,0.45);
  border-radius:4px;
  background:rgba(0,12,28,0.72);
  color:#b9ffd4;
  font-family:'Courier New',monospace;
  font-size:clamp(11px,3.2vw,14px);
  letter-spacing:2px;
  text-align:center;
  outline:none;
  box-shadow:0 0 16px rgba(68,255,136,0.15), inset 0 0 10px rgba(68,255,136,0.08);
  text-transform:uppercase;
}
#playerNameInput::placeholder{color:rgba(185,255,212,0.42);}
.name-hint{font-size:9px;color:#337755;letter-spacing:1.5px;margin-top:6px;text-shadow:0 0 8px rgba(68,255,136,0.25);}

/* HUD */
#hud{position:absolute;top:0;left:0;right:0;padding:14px 16px;display:flex;justify-content:space-between;align-items:flex-start;z-index:55;pointer-events:none;}
#hud.hidden{display:none;}
.hud-score{font-size:clamp(20px,5.5vw,30px);color:#fff;font-weight:700;text-shadow:0 0 12px #3366ff;line-height:1;}
.hud-sub{font-size:clamp(9px,2.4vw,12px);color:#3366aa;margin-top:3px;letter-spacing:1px;}
.hud-right{text-align:right;}
.bot-player{
  color:#44ff88;
  margin-top:4px;
  letter-spacing:1.5px;
  text-shadow:0 0 10px #00ff66,0 0 22px rgba(68,255,136,0.35);
}
.bot-player.hidden{display:none;}

/* POWERUP ROW */
#puRow{position:absolute;top:145px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:56;pointer-events:none;}
.pu-pill{padding:3px 10px;border-radius:20px;font-size:11px;letter-spacing:1px;border:1px solid rgba(255,255,255,0.3);background:rgba(0,0,0,0.5);color:#fff;white-space:nowrap;}

/* energy bar */
#energyWrap{position:absolute;bottom:168px;left:50%;transform:translateX(-50%);width:90px;z-index:55;pointer-events:none;}
#energyWrap.hidden{display:none;}
#eTrack{width:100%;height:6px;background:rgba(255,255,255,0.06);border-radius:3px;border:1px solid #0a1a44;}
#eFill{height:100%;width:0%;border-radius:3px;background:linear-gradient(to right,#1133aa,#4488ff);transition:width 0.18s;}
#bhTrack{width:100%;height:5px;margin-top:6px;background:rgba(60,0,90,0.22);border-radius:3px;border:1px solid rgba(170,68,255,0.42);box-shadow:0 0 10px rgba(170,68,255,0.12);}
#bhFill{height:100%;width:100%;border-radius:3px;background:linear-gradient(to right,#5b1abf,#aa44ff,#dd99ff);box-shadow:0 0 12px rgba(170,68,255,0.55);transition:width 0.12s linear, opacity 0.12s linear;}
.ctrl.bot-press{background:rgba(55,95,255,0.62)!important;border-color:#66a0ff!important;box-shadow:0 0 32px rgba(68,130,255,0.95),inset 0 0 20px rgba(68,130,255,0.35)!important;transform:scale(0.94);}
#fireBtn.bot-press{background:rgba(55,95,255,0.52)!important;border-color:#88bbff!important;box-shadow:0 0 36px rgba(68,130,255,1),inset 0 0 26px rgba(120,180,255,0.35)!important;transform:scale(0.94);}
#leftBtn.bot-press::after,#rightBtn.bot-press::after,#fireBtn.bot-press::after{content:'BOT';position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:2px;color:#88bbff;text-shadow:0 0 12px #4488ff;font-family:'Courier New',monospace;}





@keyframes sPulse{from{opacity:0.7;}to{opacity:1;}}
@keyframes superWaveAnim{
  0%  {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100%{background-position:0% 50%;}
}
/* SUPER ZONE — широкая зона нажатия снизу */

/* COMBO */
#comboEl{position:fixed;top:38%;left:50%;transform:translateX(-50%);z-index:60;pointer-events:none;opacity:0;font-size:clamp(20px,6vw,36px);font-weight:900;letter-spacing:5px;white-space:nowrap;text-align:center;transition:opacity 0.2s;}
#comboEl.on{opacity:1;}

/* EVENT */
#evEl{position:fixed;top:28%;left:50%;transform:translateX(-50%);z-index:60;pointer-events:none;opacity:0;font-size:clamp(13px,4vw,20px);font-weight:900;letter-spacing:4px;white-space:nowrap;text-align:center;transition:opacity 0.2s;}
#evEl.on{opacity:1;}

/* NEAR MISS */
#nmEl{position:fixed;z-index:60;pointer-events:none;opacity:0;font-size:clamp(11px,3vw,15px);font-weight:700;letter-spacing:3px;color:#ffaa44;text-shadow:0 0 12px #ff8800;transition:opacity 0.2s;white-space:nowrap;}
#nmEl.on{opacity:1;}

/* LEVEL BANNER */
#lvlBanner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:80;pointer-events:none;opacity:0;transition:opacity 0.2s;}
#lvlBanner.on{opacity:1;}
.lb-num{font-size:clamp(32px,11vw,72px);font-weight:900;color:#fff;letter-spacing:4px;text-shadow:0 0 30px currentColor;}
.lb-name{font-size:clamp(12px,3.5vw,18px);letter-spacing:6px;margin-top:4px;}

/* GLITCH OVERLAY */
#glitch{position:fixed;inset:0;z-index:90;pointer-events:none;opacity:0;background:transparent;}
#glitch.on{opacity:1;}

/* SCANLINES */
#scanlines{position:fixed;inset:0;z-index:70;pointer-events:none;opacity:0.04;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.4) 2px,rgba(0,0,0,0.4) 4px);}
:fullscreen body,::-webkit-full-screen body{background:#000;}
:fullscreen canvas,::-webkit-full-screen canvas{display:block;position:absolute;inset:0;width:100%;height:100%;}

/* CHROMATIC */
#chroma{position:fixed;inset:0;z-index:75;pointer-events:none;opacity:0;mix-blend-mode:screen;}

/* CONTROLS */
#controls{position:absolute;bottom:0;left:0;right:0;height:158px;display:flex;align-items:center;justify-content:space-between;padding:0 16px 24px;z-index:55;pointer-events:none;}
#controls.hidden{display:none;}
.ctrl{width:94px;height:94px;border-radius:50%;background:rgba(0,15,60,0.45);border:1px solid #1a3a88;display:flex;align-items:center;justify-content:center;pointer-events:all;cursor:pointer;font-size:30px;color:#3366cc;-webkit-tap-highlight-color:transparent;transition:all 0.1s;box-shadow:0 0 14px rgba(20,60,200,0.25);}
.ctrl:active{background:rgba(30,70,200,0.45);border-color:#4488ff;box-shadow:0 0 22px rgba(51,102,255,0.5);}
#fireBtn{width:86px;height:86px;border-radius:50%;background:rgba(0,8,44,0.6);border:2px solid #2255cc;box-shadow:0 0 18px rgba(51,102,255,0.5),inset 0 0 12px rgba(51,102,255,0.1);display:flex;align-items:center;justify-content:center;pointer-events:all;cursor:pointer;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;}
#fireBtn:active{background:rgba(40,80,200,0.4);}
/* cooldown ring */
#fireCd{position:absolute;inset:0;border-radius:50%;}
#fireCd svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg);}
#fireCd circle{fill:none;stroke:#4488ff;stroke-width:3;stroke-linecap:round;stroke-dasharray:240;stroke-dashoffset:240;transition:stroke-dashoffset 0.05s linear;}
/* techno pulse on fire btn */
@keyframes fireGlow{from{box-shadow:0 0 16px rgba(51,102,255,0.5),inset 0 0 10px rgba(51,102,255,0.1);}to{box-shadow:0 0 28px rgba(51,102,255,0.9),inset 0 0 18px rgba(51,102,255,0.25);}}
#fireBtn{animation:fireGlow 1.2s ease-in-out infinite alternate;}
/* life module pulse */
@keyframes lifeGlow{from{filter:drop-shadow(0 0 3px #ff2266);}to{filter:drop-shadow(0 0 7px #ff44aa);}}
#livesRow svg[data-active="1"]{animation:lifeGlow 1.4s ease-in-out infinite alternate;}
/* scan line on hud */
#hud::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.08) 3px,rgba(0,0,0,0.08) 4px);pointer-events:none;}
/* techno hud border */
#hud{border-bottom:1px solid rgba(51,102,255,0.12);}

#superBtn{
  position:absolute;bottom:0;left:0;right:0;height:220px;
  background:linear-gradient(to top,rgba(40,100,255,0.6) 0%,rgba(40,90,240,0.32) 20%,rgba(20,70,200,0.14) 50%,transparent 100%);
  border:none;outline:none;display:none;
  pointer-events:all;cursor:pointer;
  z-index:54;-webkit-tap-highlight-color:transparent;
}
#superBtn::before{
  content:'';position:absolute;
  bottom:0;left:0;right:0;height:5px;
  background:linear-gradient(to right,transparent 0%,rgba(80,140,255,0.5) 10%,rgba(160,210,255,1) 50%,rgba(80,140,255,0.5) 90%,transparent 100%);
  box-shadow:0 0 28px 8px rgba(60,110,255,0.9),0 0 60px 20px rgba(40,80,255,0.5),0 0 100px 30px rgba(20,60,200,0.25);
}
#superBtn::after{
  content:'';position:absolute;
  bottom:8px;left:15%;right:15%;height:1px;
  background:linear-gradient(to right,transparent,rgba(120,180,255,0.5),transparent);
}
#superBtn.hidden{display:none;}
#superBtn:not(.hidden){display:block;animation:sPulse 0.75s ease-in-out infinite alternate;}

@keyframes micPulse{from{text-shadow:0 0 10px #3366ff;}to{text-shadow:0 0 28px #88aaff,0 0 50px #4466ff;}}

/* Landscape overlay */
#landscapeMsg{display:none;position:fixed;inset:0;background:#000;z-index:9999;
  align-items:center;justify-content:center;flex-direction:column;color:#fff;
  font-family:'Courier New',monospace;font-size:clamp(14px,4vw,22px);
  letter-spacing:3px;text-align:center;}
@media (orientation:landscape) and (max-height:500px){
  #landscapeMsg{display:flex;}
}

#gameWrap{
  position:relative;
  width:100vw;height:100vh;
  max-width:calc(100vh * 9 / 16);
  background:#000;overflow:hidden;flex-shrink:0;
}
body{display:flex;align-items:center;justify-content:center;}
@media(max-width:600px){#gameWrap{
  position:relative;
  width:100vw;height:100vh;
  max-width:calc(100vh * 9 / 16);
  background:#000;overflow:hidden;flex-shrink:0;
}}
body,button,.screen,#hud,#controls,#comboEl,#evEl,#nmEl,#lvlBanner{font-family:'Courier New',monospace;}
</style>
</head>
<body>

<!-- START -->
<!-- START -->
<div class="screen" id="startScreen">
  <div class="title">SPACE<br>SPHERE</div>
  <input id="playerNameInput" maxlength="10" autocomplete="off" autocapitalize="characters" spellcheck="false" placeholder="PLAYER NAME">
  <div class="name-hint">A-Z / 0-9 · MAX 10</div>
  <button class="btn primary" id="startBtn" style="margin-top:28px;">START GAME</button>
  <button class="btn" id="botModeBtn" style="margin-top:10px;font-size:clamp(10px,3vw,13px);">BOT MODE: ON</button>
  <div id="botModeLabel">BOT WILL PLAY AUTOMATICALLY</div>

</div>

<!-- GAME OVER -->
<div class="screen hidden" id="goScreen">
  <div class="title" style="font-size:clamp(20px,6vw,36px);margin-bottom:4px;">GAME OVER</div>
  <div class="score-label" style="margin-top:18px;">SCORE</div>
  <div class="score-display" id="goScore">0</div>
  <div class="score-label" style="margin-top:6px;">BEST</div>
  <div class="best-display" id="goBest">0</div>
  <div class="bot-report-title">BOT TEST REPORT</div>
  <textarea id="botReport" readonly>Report will appear here after the bot run.</textarea>
  <button class="btn" id="copyReportBtn">COPY REPORT</button>
  <button class="btn primary" id="restartBtn">PLAY AGAIN</button>
</div>

<!-- HUD -->
<div id="hud" class="hidden">
  <div>
    <div class="hud-score" id="hudScore">0</div>
    <div class="hud-sub" id="hudLvl">LEVEL 1</div>
    <div class="hud-sub" id="hudBest">BEST: 0</div>
    <div class="hud-sub bot-player hidden" id="hudPlayer">PLAYER: NEONVJ42</div>
  </div>

  <div style="display:flex;gap:6px;margin-top:4px;" id="livesRow"></div>
</div>

<!-- PU ROW -->
<div id="puRow"></div>

<!-- energy bar + super -->
<div id="energyWrap" class="hidden">
  <div id="eTrack"><div id="eFill"></div></div>
  <div id="bhTrack"><div id="bhFill"></div></div>
</div>
<!-- super zone: wide tap area shown when energy ready -->
<button id="superBtn" class="hidden"></button>

<!-- COMBO -->
<div id="comboEl"></div>
<!-- EVENT -->
<div id="evEl"></div>
<!-- NEAR MISS -->
<div id="nmEl">NEAR MISS +25</div>
<!-- LEVEL BANNER -->
<div id="lvlBanner"><div class="lb-num" id="lbNum">LEVEL 2</div></div>

<!-- GLITCH / CHROMA -->
<div id="glitch"></div>
<div id="scanlines"></div>
<div id="chroma"></div>

<!-- CONTROLS -->
<div id="controls" class="hidden">
  <div class="ctrl" id="leftBtn">◀</div>
  <div id="fireBtn">
    <div id="fireCd">
      <svg viewBox="0 0 86 86" style="position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg);">
        <circle cx="43" cy="43" r="38" id="cdCircle"/>
      </svg>
    </div>
<!-- energy ring only -->
  </div>
  <div class="ctrl" id="rightBtn">▶</div>
</div>

<div id="gameWrap"><canvas id="c"></canvas>
<div id="landscapeMsg">
  <div style="font-size:2em;margin-bottom:16px;">⟳</div>
  <div>ROTATE YOUR DEVICE</div>
</div></div>

<script>
// ═══════════════════════════════════════════════════════
//  THEMES
// ═══════════════════════════════════════════════════════
var THEMES=[
  {name:'DEEP SPACE',   bg:'#00000a',nebula:'rgba(18,12,65,0.25)',  ring:'#cc44aa',accent:'#3366ff',star:'rgba(200,215,255,'},
  {name:'CRIMSON BELT', bg:'#08000a',nebula:'rgba(90,8,22,0.28)',   ring:'#ff5522',accent:'#ff2244',star:'rgba(255,210,210,'},
  {name:'TOXIC FIELD',  bg:'#00080a',nebula:'rgba(8,85,38,0.25)',   ring:'#33ffaa',accent:'#11ff77',star:'rgba(200,255,220,'},
  {name:'VOID STORM',   bg:'#05000f',nebula:'rgba(65,8,120,0.28)',  ring:'#bb55ff',accent:'#8833ff',star:'rgba(220,200,255,'},
  {name:'SOLAR FLARE',  bg:'#0a0600',nebula:'rgba(120,65,5,0.26)',  ring:'#ffcc22',accent:'#ff9900',star:'rgba(255,245,200,'},
  {name:'ICE NEBULA',   bg:'#00080f',nebula:'rgba(6,65,115,0.26)',  ring:'#33aaff',accent:'#00ccff',star:'rgba(200,235,255,'},
];

// ═══════════════════════════════════════════════════════
//  CANVAS
// ═══════════════════════════════════════════════════════
var C=document.getElementById('c'),ctx=C.getContext('2d'),W,H;
var DPR=Math.min(window.devicePixelRatio||1,3);
function resize(){
  var wrap=document.getElementById('gameWrap');
  var ww=wrap?wrap.clientWidth:window.innerWidth;
  var wh=wrap?wrap.clientHeight:window.innerHeight;
  W=ww; H=wh;                         // логические CSS пиксели для gameplay
  C.style.width=ww+'px';
  C.style.height=wh+'px';
  C.width=Math.floor(ww*DPR);         // физические пиксели canvas
  C.height=Math.floor(wh*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0); // масштаб под retina
  ctx.imageSmoothingEnabled=true;
  ctx.imageSmoothingQuality='high';
  if(ship&&ship.y){
    ship.y=H*0.62;
    ship.x=Math.max(ship.w/2+10,Math.min(W-ship.w/2-10,ship.x||W/2));
  }
}
resize(); window.addEventListener('resize',function(){setTimeout(resize,50);});

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
var state='start',score=0,level=1,best=parseInt(localStorage.getItem('sfv4')||'0');
var frame=0,scoreAcc=0,flashT=0;
var astT=0,enemyT=0,waveT=0,wavePhase=0,stormT=0;
// Fire energy system
var fireEnergy=100,maxFireEnergy=100;
var fireCooldown=0;       // frames remaining
var COOLDOWN_TAP=14;      // frames (~0.23s at 60fps)
var COOLDOWN_HOLD=7;      // frames (~0.12s at 60fps)
var COST_TAP=18,COST_HOLD=10,MIN_ENERGY=10;
var REGEN=0.47;           // per frame (~28/sec)
var isHolding=false;

// Lives
var lives=3,maxLives=3,nextLifeScore=1000;

var moveDir=0,firing=false;
var inTrans=false,transT=0,shockwave=null,pendingLvl=0;
var combo=0,comboT=0,maxCombo=1;
var beatT=0; // pseudo-beat timer

// Ship
var ship={x:0,y:0,w:66,h:42,vx:0,tilt:0,shield:0,iframes:0,recoil:0};

// Powerups
var pw={triple:0,slow:0,double:0,doubleMult:1,energy:0,superReady:false};
var MAX_ENERGY=100;

// Arrays
var stars=[],bullets=[],asteroids=[],enemies=[],eBullets=[],bonuses=[],expl=[],parts=[],interferences=[];
var MAX_PARTS=120,MAX_EXPL=80; // лимиты частиц
var interfTimer=0,megaWave=null;
var blackhole=null;
var scoreDrain=0;
var bhHoldTime=0;    // фреймы удержания 0..BH_MAX
var bhCooldown=0;    // фреймы до готовности
var BH_MAX=180;  // max hold frames
var BH_CD=120;   // cooldown frames
var BH_RMIN=30; // min radius
var BH_RMAX=155; // max radius - stronger magnet
var boss=null;          // активный босс
var bossWarning=0;      // кадры предупреждения
var bossEncounter=0;    // счётчик встреч с боссом

// Glitch state
var glitchT=0, chromaT=0, shakeX=0, shakeY=0, shakeT=0;

// ═══════════════════════════════════════════════════════
//  BOT TEST MODE
// ═══════════════════════════════════════════════════════
// This build can run as normal player mode or self-playing bot test mode.
var botMode=true;

var botTest={
  enabled:false,
  startFrame:0,
  maxScore:0,
  maxLevel:1,
  livesLost:0,
  shots:0,
  superUsed:0,
  blackholesUsed:0,
  bonuses:{shield:0,triple:0,bomb:0,slow:0,double:0},
  maxDanger:0,
  lastDecision:'',
  lastDangerReason:'',
  lastX:0,
  playerName:'NEONVJ42'
};

function sanitizePlayerNameInput(){
  var inp=document.getElementById('playerNameInput');
  if(!inp)return '';
  var v=(inp.value||'').replace(/[^A-Za-z0-9]/g,'').toUpperCase().slice(0,10);

function botClamp(v,a,b){return Math.max(a,Math.min(b,v));}

function botDangerAt(x){
  var danger=0, reason='';
  var i,o,dx,dy,t,predX,rad,tt,pen;

  // Falling asteroids.
  for(i=0;i<asteroids.length;i++){
    o=asteroids[i];
    dy=ship.y-o.y;
    if(dy>-80 && dy<420){
      t=dy/Math.max(0.8,o.vy||1);
      predX=o.x+(o.vx||0)*botClamp(t,0,70);
      dx=Math.abs(predX-x);
      rad=o.r+ship.w*0.43+18;
      if(t>-10 && t<75 && dx<rad*1.55){
        pen=(rad*1.55-dx)*(1.6+(75-t)/75);
        danger+=pen;
        reason='asteroid';
      }
    }
  }

  // Enemy bullets.
  for(i=0;i<eBullets.length;i++){
    o=eBullets[i];
    dy=ship.y-o.y;
    if(dy>-40 && dy<360){
      t=dy/Math.max(1,o.vy||1);
      predX=o.x+(o.vx||0)*botClamp(t,0,70);
      dx=Math.abs(predX-x);
      rad=ship.w*0.48+20;
      if(t>-8 && t<80 && dx<rad*1.4){
        danger+=(rad*1.4-dx)*2.8;
        reason='enemy bullet';
      }
    }
  }

  // Glitch interferences.
  for(i=0;i<interferences.length;i++){
    o=interferences[i];
    dy=ship.y-o.y;
    if(dy>-100 && dy<440){
      t=dy/Math.max(0.8,o.vy||1);
      predX=o.x+(o.vx||0)*botClamp(t,0,90);
      dx=Math.abs(predX-x);
      rad=o.r+ship.w*0.5+24;
      if(t>-15 && t<95 && dx<rad*1.5){
        danger+=(rad*1.5-dx)*2.1;
        reason='glitch';
      }
    }
  }

  // Boss body.
  if(boss&&!boss.dying){
    dx=Math.abs(boss.x-x);
    if(boss.y<ship.y && dx<boss.r+ship.w*0.8){
      danger+=(boss.r+ship.w*0.8-dx)*1.4;
      reason='boss';
    }
  }

  if(danger>botTest.maxDanger){
    botTest.maxDanger=danger;
    botTest.lastDangerReason=reason;
  }
  return danger;
}

function botBonusRewardAt(x){
  var reward=0, i,b,dx,dy;
  for(i=0;i<bonuses.length;i++){
    b=bonuses[i];
    dy=Math.abs(ship.y-b.y);
    if(b.y>-20 && b.y<ship.y+80){
      dx=Math.abs(x-b.x);
      reward+=Math.max(0,220-dx*3.0-dy*0.45);
      if(b.type==='shield')reward+=60;
      if(b.type==='slow')reward+=45;
      if(b.type==='triple')reward+=30;
      if(b.type==='double')reward+=25;
      if(b.type==='bomb')reward+=90;
    }
  }
  return reward;
}

function botAttackRewardAt(x){
  var reward=0, i,o,dx,dy,targetX=null,bestY=99999;
  for(i=0;i<asteroids.length;i++){
    o=asteroids[i];
    if(o.y<ship.y-30 && o.y>-60 && o.y<bestY){
      bestY=o.y;targetX=o.x;
    }
  }
  for(i=0;i<interferences.length;i++){
    o=interferences[i];
    if(o.y<ship.y-10 && o.y>-60 && o.y<bestY){
      bestY=o.y;targetX=o.x;
    }
  }
  if(boss&&!boss.dying) targetX=boss.x;
  if(targetX!==null){
    dx=Math.abs(x-targetX);
    reward+=Math.max(0,80-dx*0.7);
  }
  return reward;
}

function updateBotController(){
  if(!botTest.enabled||state!=='playing')return;

  botTest.maxScore=Math.max(botTest.maxScore,score);
  botTest.maxLevel=Math.max(botTest.maxLevel,level);

  var left=ship.w*0.5+12;
  var right=W-ship.w*0.5-12;
  var bestX=ship.x, bestScore=999999, bestDanger=0;
  var steps=26, i,x,danger,scoreLine,distPenalty;

  // Search safest lane with bonus reward and some aiming.
  for(i=0;i<=steps;i++){
    x=left+(right-left)*(i/steps);
    danger=botDangerAt(x);
    distPenalty=Math.abs(x-ship.x)*0.22;
    scoreLine=danger+distPenalty-botBonusRewardAt(x)-botAttackRewardAt(x);
    if(scoreLine<bestScore){
      bestScore=scoreLine;
      bestX=x;
      bestDanger=danger;
    }
  }

  var dx=bestX-ship.x;
  if(Math.abs(dx)<8) moveDir=0;
  else moveDir=dx>0?1:-1;

  // Fire only when useful or danger is high, but avoid draining all energy.
  var targetAbove=false;
  for(i=0;i<asteroids.length;i++){
    if(asteroids[i].y<ship.y && Math.abs(asteroids[i].x-ship.x)<90){targetAbove=true;break;}
  }
  if(!targetAbove){
    for(i=0;i<interferences.length;i++){
      if(interferences[i].y<ship.y+60 && Math.abs(interferences[i].x-ship.x)<110){targetAbove=true;break;}
    }
  }
  if(boss&&!boss.dying)targetAbove=true;
  firing=(fireEnergy>35 && targetAbove) || (bestDanger>80 && fireEnergy>MIN_ENERGY);

  // Use super as emergency clear or boss damage.
  if(pw.superReady && (bestDanger>160 || asteroids.length+interferences.length>9 || (boss&&!boss.dying))){
    superBlast();
    botTest.lastDecision='super';
  }

  // Use blackhole on dense/dangerous area, especially glitches.
  if(!blackhole && bhCooldown<=0 && bestDanger>95){
    var target=null, best=99999, yy;
    for(i=0;i<interferences.length;i++){
      yy=Math.abs(interferences[i].y-ship.y);
      if(interferences[i].y<ship.y+60 && yy<best){best=yy;target=interferences[i];}
    }
    if(!target){
      for(i=0;i<asteroids.length;i++){
        yy=Math.abs(asteroids[i].y-ship.y);
        if(asteroids[i].y<ship.y+40 && yy<best){best=yy;target=asteroids[i];}
      }
    }
    if(target){
      if(placeBlackholeAt(target.x,target.y)){
        botTest.lastDecision='magnet '+(target.type||'target');
      }
    }
  }

  botTest.lastX=bestX;
}

function buildBotReport(finalScore){
  var seconds=Math.max(1,Math.round((frame-botTest.startFrame)/60));
  var min=Math.floor(seconds/60);
  var sec=seconds%60;
  var notes=[];
  if(botTest.livesLost>0)notes.push('- Bot lost lives: check asteroid density, collision spacing, or safe lanes.');
  if(botTest.maxDanger>220)notes.push('- High danger spike detected: '+botTest.lastDangerReason+'.');
  if(botTest.bonuses.bomb>0)notes.push('- Bomb bonus was used; large clear events can affect balance.');
  if(botTest.superUsed===0)notes.push('- Super was never needed/ready, check whether energy pacing is too slow or bot survived without it.');
  if(notes.length===0)notes.push('- No critical issue detected before death/end of run.');

  return [
    'BOT TEST REPORT',
    'Player: '+botTest.playerName,
    'Score: '+finalScore,
    'Best during run: '+botTest.maxScore,
    'Level reached: '+botTest.maxLevel,
    'Time survived: '+min+'m '+sec+'s',
    'Lives lost: '+botTest.livesLost,
    'Shots fired: '+botTest.shots,
    'Super used: '+botTest.superUsed,
    'Blackholes used: '+botTest.blackholesUsed,
    'Bonuses collected:',
    '  shield: '+botTest.bonuses.shield,
    '  triple: '+botTest.bonuses.triple,
    '  bomb: '+botTest.bonuses.bomb,
    '  slow: '+botTest.bonuses.slow,
    '  double: '+botTest.bonuses.double,
    'Max danger value: '+Math.round(botTest.maxDanger),
    'Last danger reason: '+(botTest.lastDangerReason||'none'),
    '',
    'Notes:',
    notes.join('\n')
  ].join('\n');
}

function updateBlackholeBar(){
  var f=document.getElementById('bhFill');

  if(botTest.enabled){

    f.style.width='0%';
    f.style.opacity='0';
    return;
  }else{

  }

  if(state!=='playing'){
    f.style.width='0%';
    f.style.opacity='0.35';
    return;
  }
  var pct=1;
  if(blackhole){
    // while magnet is active, show remaining active time
    pct=Math.max(0,1-(bhHoldTime/BH_MAX));
    f.style.opacity='0.9';
  }else if(bhCooldown>0){
    // while recharging, fill from 0 to 100
    pct=1-(bhCooldown/BH_CD);
    f.style.opacity='0.65';
  }else{
    pct=1;
    f.style.opacity='1';
  }
  f.style.width=Math.round(pct*100)+'%';
}

function placeBlackholeAt(x,y){
  if(state!=='playing')return false;
  if(blackhole||bhCooldown>0)return false;

  // Magnet can be placed only in the upper gameplay area.
  // This prevents accidental magnet activation on the control buttons / bottom UI.
  var magnetZoneBottom = Math.min(H * 0.68, H - 235);
  if(y > magnetZoneBottom)return false;

  bhHoldTime=0;
  blackhole={
    x:botClamp(x,BH_RMIN,W-BH_RMIN),
    y:botClamp(y,BH_RMIN,magnetZoneBottom),
    r:BH_RMIN
  };
  if(botTest.enabled)botTest.blackholesUsed++;
  return true;
}

function cirR(cx,cy,cr,rx,ry,rw,rh){
  var nx=Math.max(rx-rw/2,Math.min(cx,rx+rw/2));
  var ny=Math.max(ry-rh/2,Math.min(cy,ry+rh/2));
  var dx=cx-nx,dy=cy-ny; return dx*dx+dy*dy<cr*cr;
}

function shoot(fromHold){
  if(state!=='playing')return;
  if(fireCooldown>0)return;
  if(fireEnergy<MIN_ENERGY)return;
  var cost=fromHold?COST_HOLD:COST_TAP;
  var cd=fromHold?COOLDOWN_HOLD:COOLDOWN_TAP;
  fireCooldown=cd;
  fireEnergy=Math.max(0,fireEnergy-cost);
  if(botTest.enabled)botTest.shots++;
  ship.recoil=fromHold?3:6;
  if(pw.triple>0){

// Притягивание объекта к чёрной дыре
function bhPull(obj, strength){
  if(!blackhole)return;
  var dx=blackhole.x-obj.x, dy=blackhole.y-obj.y;
  var dist=Math.sqrt(dx*dx+dy*dy)||1;
  var zone=blackhole.r*3.45;
  if(dist>zone)return;
  // сила нелинейная — у края слабее, у центра сильнее
  var t=1-(dist/zone);
  var force=t*t*strength*(1.15+bhHoldTime/BH_MAX*2.35);
  obj.x+=dx/dist*force;
  obj.y+=dy/dist*force;
}

function updateBlackhole(){
  // cooldown countdown
  if(bhCooldown>0){bhCooldown--;return;}

  if(!blackhole)return;

  // увеличиваем время удержания
  bhHoldTime++;
  // радиус растёт от BH_RMIN до BH_RMAX
  blackhole.r = BH_RMIN + (BH_RMAX-BH_RMIN)*(bhHoldTime/BH_MAX);

  // истечение лимита — схлопывание
  if(bhHoldTime>=BH_MAX){
    // mini glitch burst
    var ci;for(ci=0;ci<8;ci++){var ca=rnd(0,Math.PI*2);parts.push({x:blackhole.x,y:blackhole.y,vx:Math.cos(ca)*rnd(2,5),vy:Math.sin(ca)*rnd(2,5),r:rnd(2,5),life:1,decay:0.06,col:'#aa44ff'});}
    triggerGlitch(10);
    blackhole=null;
    bhHoldTime=0;
    bhCooldown=BH_CD;
    return;
  }

  // damage boss
  if(boss&&!boss.dying){
    var bdx=blackhole.x-boss.x,bdy=blackhole.y-boss.y;
    if(Math.sqrt(bdx*bdx+bdy*bdy)<blackhole.r+boss.r*0.5){
      boss.hp-=0.15;boss.hitFlash=4;
      if(boss.hp<=0)boss.dying=true;
    }
  }
  // damage interferences
  interferences=interferences.filter(function(it){
    var dx=blackhole.x-it.x,dy=blackhole.y-it.y;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<blackhole.r+it.r){
      it.hp-=0.07;it.hitFlash=4;
      if(it.hp<=0){
        triggerGlitch(12);
        addBoom(it.x,it.y,false,'#aa44ff',14);
        var pi;for(pi=0;pi<14;pi++){var pa=rnd(0,Math.PI*2);parts.push({x:it.x,y:it.y,vx:Math.cos(pa)*rnd(1,5),vy:Math.sin(pa)*rnd(1,5),r:rnd(2,4),life:1,decay:0.04+rnd(0,0.04),col:'#aa44ff'});}
        addScore(60);addCombo();
        return false;
      }
    }
    return true;
  });

  // damage asteroids в зоне
  asteroids=asteroids.filter(function(a){
    var dx=blackhole.x-a.x,dy=blackhole.y-a.y;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<blackhole.r*0.6){  // только в ядре — не слишком сильно
      a.hp-=0.04;a.hitFlash=4;
      if(a.hp<=0){
        addBoom(a.x,a.y,a.r>28,a.col,8);
        addScore(a.pts);addCombo();
        return false;
      }
    }
    return true;
  });
}

function drawBlackhole(){
  // cooldown indicator: маленькое кольцо у пальца если в cooldown
  // (не показываем — нет координат пальца в cd)

  if(!blackhole)return;
  var timePct=1-(bhHoldTime/BH_MAX); // 1=полный, 0=истёк
  // цвет меняется к красному когда времени мало
  var r255=Math.round(130+(125*(1-timePct)));
  var g255=Math.round(50*(timePct));
  var b255=Math.round(230*(timePct));
  var ringCol='rgba('+r255+','+g255+','+b255+',0.85)';
  var glowCol='rgba('+r255+','+g255+','+b255+',0.5)';

  // мигание когда меньше 20% времени
  var blinkOk = timePct>0.2 || (frame%8<4);

  ctx.save();ctx.translate(blackhole.x,blackhole.y);

  // outer glow
  if(blinkOk){
    ctx.save();
    ctx.shadowColor=ringCol;ctx.shadowBlur=32;
    ctx.strokeStyle=ringCol;
    ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(0,0,blackhole.r,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }

  // TIME ARC — убывающая дуга показывает оставшееся время
  ctx.save();
  ctx.strokeStyle='rgba(200,150,255,0.9)';
  ctx.lineWidth=3;
  ctx.shadowColor='#cc88ff';ctx.shadowBlur=10;
  var arcEnd=-Math.PI/2+(Math.PI*2*timePct);
  ctx.beginPath();ctx.arc(0,0,blackhole.r+6,-Math.PI/2,arcEnd);ctx.stroke();
  ctx.restore();

  // rotating segments
  var i,segs=8,segA=Math.PI*2/segs;
  ctx.strokeStyle=glowCol;ctx.lineWidth=1.2;
  for(i=0;i<segs;i+=2){
    var a0=frame*0.07+i*segA;
    ctx.beginPath();ctx.arc(0,0,blackhole.r*0.76,a0,a0+segA*0.6);ctx.stroke();
  }

  // inner void
  var bg=ctx.createRadialGradient(0,0,0,0,0,blackhole.r*0.85);
  bg.addColorStop(0,'rgba(0,0,0,0.78)');
  bg.addColorStop(0.45,'rgba(50,0,100,0.52)');
  bg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=bg;
  ctx.beginPath();ctx.arc(0,0,blackhole.r*0.85,0,Math.PI*2);ctx.fill();

  // core glow
  ctx.save();
  ctx.shadowColor='#aa44ff';ctx.shadowBlur=20;
  ctx.fillStyle='rgba('+r255+',0,200,0.9)';
  ctx.beginPath();ctx.arc(0,0,blackhole.r*0.16,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // sparks
  for(i=0;i<4;i++){
    var sa=rnd(0,Math.PI*2),sr=rnd(blackhole.r*0.3,blackhole.r*0.85);
    ctx.strokeStyle='rgba(180,100,255,0.4)';ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(Math.cos(sa)*sr,Math.sin(sa)*sr);
    ctx.lineTo(Math.cos(sa+0.28)*(sr*0.55),Math.sin(sa+0.28)*(sr*0.55));
    ctx.stroke();
  }

  ctx.restore();
}

function drawInterference(it){
  ctx.save();ctx.translate(it.x,it.y);
  var pulse=0.55+Math.sin(frame*0.13+it.phase)*0.35;
  // outer ring — segments via arc
  ctx.save();
  ctx.strokeStyle='rgba(160,60,255,'+(0.65*pulse)+')';
  ctx.lineWidth=1.8;
  // рисуем пунктир через отдельные дуги
  var i,segs=12,segA=Math.PI*2/segs;
  for(i=0;i<segs;i+=2){
    var a0=i*segA+it.rot;
    ctx.beginPath();ctx.arc(0,0,it.r,a0,a0+segA*0.65);ctx.stroke();
  }
  ctx.restore();
  // mid ring
  ctx.strokeStyle='rgba(120,40,200,'+(0.4*pulse)+')';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(0,0,it.r*0.6,0,Math.PI*2);ctx.stroke();
  // rotating core square
  ctx.save();ctx.rotate(it.rot);
  ctx.strokeStyle='rgba(180,80,255,'+(0.8*pulse)+')';ctx.lineWidth=1.2;
  var s2=it.r*0.3;
  ctx.beginPath();
  ctx.moveTo(-s2,-s2);ctx.lineTo(s2,-s2);ctx.lineTo(s2,s2);ctx.lineTo(-s2,s2);ctx.closePath();
  ctx.stroke();ctx.restore();
  // centre dot
  ctx.save();ctx.shadowColor='#cc66ff';ctx.shadowBlur=10;
  ctx.beginPath();ctx.arc(0,0,it.r*0.12,0,Math.PI*2);
  ctx.fillStyle='#cc66ff';ctx.fill();ctx.restore();
  // HP arcs
  var j;
  for(j=0;j<it.hp;j++){
    var a0=(-Math.PI/2)+(j/it.maxHp)*Math.PI*2;
    var a1=a0+(1/it.maxHp)*Math.PI*2-0.2;
    ctx.beginPath();ctx.arc(0,0,it.r+5,a0,a1);
    ctx.strokeStyle='rgba(160,60,255,0.8)';ctx.lineWidth=2.5;ctx.stroke();
  }
  // hit flash
  if(it.hitFlash>0){it.hitFlash--;ctx.globalAlpha=(it.hitFlash/8)*0.65;ctx.beginPath();ctx.arc(0,0,it.r,0,Math.PI*2);ctx.fillStyle='#cc88ff';ctx.fill();ctx.globalAlpha=1;}
  // dying pulse — мигание при низком hp
  if(it.hp<1&&frame%6<3){ctx.globalAlpha=0.5;ctx.beginPath();ctx.arc(0,0,it.r*1.1,0,Math.PI*2);ctx.strokeStyle='#ff44ff';ctx.lineWidth=2;ctx.stroke();ctx.globalAlpha=1;}
  ctx.restore();
}

function updateBoss(){
  if(!boss)return;
  if(boss.dying){
    boss.dyingT++;
    if(boss.dyingT===1){
      addBoom(boss.x,boss.y,true,'#ff4488',30);
      for(var i=0;i<8;i++){
        var a=i/8*Math.PI*2;
        parts.push({x:boss.x,y:boss.y,vx:Math.cos(a)*rnd(4,12),vy:Math.sin(a)*rnd(4,12),r:rnd(4,8),life:1,decay:0.015+rnd(0,0.02),col:'#ff4488'});
      }
      addScore(500,true);
      spawnBonus(boss.x,boss.y);
      triggerGlitch(40);triggerShake(18,26);triggerChroma(30);
    }
    if(boss.dyingT>55){boss=null;}
    return;
  }

  // движение — синусоида
  boss.phase+=0.022;
  boss.x+=boss.vx;
  boss.y=boss.r+30+Math.sin(boss.phase)*55;

  // отскок от стен
  if(boss.x>W-boss.r-20){boss.x=W-boss.r-20;boss.vx=-boss.cfg.spd;}
  if(boss.x<boss.r+20)   {boss.x=boss.r+20;   boss.vx= boss.cfg.spd;}

  // атаки
  boss.shootTimer--;
  if(boss.shootTimer<=0){
    boss.shootTimer=90+Math.floor(rnd(0,60));
    // выпускает помеху под себя
    if(level>=7&&interferences.length<2){spawnInterference();}
    // enemy bullet вниз
    eBullets.push({x:boss.x,y:boss.y+boss.r,vx:(Math.random()-0.5)*2,vy:3.5});
  }

  // bullets hit boss
  bullets=bullets.filter(function(b){
    var dx=b.x-boss.x,dy=b.y-boss.y;
    if(dx*dx+dy*dy<boss.r*boss.r){
      boss.hp-=1;boss.hitFlash=8;
      addBoom(b.x,b.y,false,'#ff4488',5);
      if(boss.hp<=0){boss.dying=true;}
      return false;
    }
    return true;
  });

  // ship hits boss
  if(cirR(boss.x,boss.y,boss.r*0.85,ship.x,ship.y,ship.w*0.7,ship.h*0.8)){
    if(ship.iframes===0){
      // trigger hit on ship via hitShip flag — handled in collision section
    }
  }
}

  ctx.strokeStyle='rgba(255,60,120,'+(0.5*alpha)+')';
  ctx.lineWidth=1.2;
  for(i=0;i<3;i++){
    ctx.save();ctx.rotate(frame*0.03*(i%2===0?1:-1)+i*Math.PI/3);
    ctx.beginPath();ctx.arc(0,0,boss.r*(0.45+i*0.15),0,Math.PI*2*0.7);ctx.stroke();
    ctx.restore();
  }

  // core
  ctx.save();
  ctx.shadowColor='#ff2266';ctx.shadowBlur=20*alpha;
  ctx.fillStyle='rgba(255,50,100,'+(0.9*alpha)+')';
  ctx.beginPath();ctx.arc(0,0,boss.r*0.18,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // glitch lines on body
  if(boss.dying||(frame%4===0)){
    ctx.fillStyle='rgba(255,80,140,'+(0.15*alpha)+')';
    ctx.fillRect(-boss.r,rnd(-boss.r,boss.r)*0.6,boss.r*2,rnd(1,3));
  }
  // hit flash
  if(boss.hitFlash>0){boss.hitFlash--;ctx.globalAlpha=(boss.hitFlash/8)*0.5;ctx.beginPath();ctx.arc(0,0,boss.r,0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.fill();ctx.globalAlpha=1;}

  ctx.restore();
}

function drawBossHP(){
  if(!boss||boss.dying)return;
  var pct=Math.max(0,boss.hp/boss.maxHp);
  var barW=Math.min(W*0.7,320);
  var barH=6;
  var bx=(W-barW)/2;
  var by=96;

  // bg track
  ctx.fillStyle='rgba(40,0,15,0.7)';
  ctx.fillRect(bx-2,by-2,barW+4,barH+4);

  // fill
  ctx.save();
  ctx.shadowColor='#ff2266';ctx.shadowBlur=12;
  var grad=ctx.createLinearGradient(bx,0,bx+barW,0);
  grad.addColorStop(0,'#ff2266');
  grad.addColorStop(0.5,'#ff6699');
  grad.addColorStop(1,'#ff2266');
  ctx.fillStyle=grad;
  ctx.fillRect(bx,by,barW*pct,barH);
  ctx.restore();

  // border
  ctx.strokeStyle='rgba(255,40,100,0.5)';
  ctx.lineWidth=1;
  ctx.strokeRect(bx,by,barW,barH);


}

// ═══════════════════════════════════════════════════════
function updateWave(){
  waveT++;
  if(waveT<200)      {if(wavePhase!==0)wavePhase=0;}
  else if(waveT<400) {if(wavePhase!==1)wavePhase=1;}
  else if(waveT<620) {if(wavePhase!==2)wavePhase=2;}
  else if(waveT<820) {
    if(wavePhase!==3){wavePhase=3;showEvent('// METEOR STORM','#ff4444');triggerGlitch(25);triggerShake(10,20);}
    stormT++;if(stormT%10===0)spawnAst('fast');
  } else if(waveT<940){
    if(wavePhase!==4){wavePhase=4;showEvent('-- BREATHER --','#44aaff');spawnBonus(W/2,-20);}
  } else {waveT=0;wavePhase=0;stormT=0;}
}

// ═══════════════════════════════════════════════════════
//  DRAW SHIP
// ═══════════════════════════════════════════════════════
function drawShip(x,y,tilt){
  ctx.save();
  ctx.translate(x, y+ship.recoil*0.5);
  ctx.rotate(tilt*0.28);
  var sw=ship.w, sh=ship.h;
  var IRATIO=0.9821; // lod_v4 h/w

  // Реальный визуальный размер PNG — НЕ СЖИМАЕМ, sw*1.65 как было
  var imgRatio = shipImgReady ? (shipImg.naturalHeight/shipImg.naturalWidth||IRATIO) : IRATIO;
  var iw = sw * 1.65;
  var ih = iw * imgRatio;
  // Сдвигаем только PNG-спрайт корабля чуть вверх относительно уже настроенных двигателей и cabin indicator.
  // Gameplay/hitbox/engine trails не меняем.
  var shipSpriteYOffset = -6;

  // ── 1. ENGINE TRAILS (до корабля — под ним) ──
  // Позиции двигателей привязаны к визуальной ширине PNG-корабля.
  // engX сделан чуть шире, чтобы пламя выходило прямо из боковых сопел.
  var engX = iw * 0.428;
  var engY = ih * 0.252;
  var flameW = iw * 0.052;

  var tl = 30 + Math.random()*12;
  var tlL = tl*(1+tilt*0.4); if(tlL<7)tlL=7;
  var tlR = tl*(1-tilt*0.4); if(tlR<7)tlR=7;

  function drawFlame(ex, ey, length){
    var sy = ey + 12;
    var fw = flameW;
    var tg = ctx.createLinearGradient(ex,sy,ex,sy+length);
    tg.addColorStop(0,  'rgba(216,144,255,0.98)');
    tg.addColorStop(0.18,'rgba(180,76,255,0.9)');
    tg.addColorStop(0.5, 'rgba(138,44,255,0.6)');
    tg.addColorStop(0.78,'rgba(100,20,200,0.28)');
    tg.addColorStop(1,   'rgba(60,0,140,0)');
    ctx.beginPath();
    ctx.moveTo(ex-fw, sy);
    ctx.lineTo(ex+fw, sy);
    ctx.quadraticCurveTo(ex+fw*0.7, sy+length*0.52, ex+fw*0.22, sy+length);
    ctx.quadraticCurveTo(ex, sy+length*1.06, ex-fw*0.22, sy+length);
    ctx.quadraticCurveTo(ex-fw*0.7, sy+length*0.52, ex-fw, sy);
    ctx.closePath();
    ctx.fillStyle=tg; ctx.fill();
    // core line
    ctx.strokeStyle='rgba(230,180,255,0.85)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(ex,sy);ctx.lineTo(ex,sy+length*0.72);ctx.stroke();
    // glow spot
    var sg = ctx.createRadialGradient(ex,sy,0,ex,sy,fw*1.5);
    sg.addColorStop(0,'rgba(230,160,255,0.75)');
    sg.addColorStop(0.5,'rgba(180,80,255,0.3)');
    sg.addColorStop(1,'rgba(138,44,255,0)');
    ctx.fillStyle=sg;ctx.beginPath();ctx.arc(ex,sy,fw*1.5,0,Math.PI*2);ctx.fill();
  }

  drawFlame(-engX, engY, tlL);
  drawFlame( engX, engY, tlR);

  // ── 2. PNG КОРАБЛЬ (размер не изменён: sw*1.65) ──
  if(shipImgReady){
    ctx.imageSmoothingEnabled=true;
    ctx.imageSmoothingQuality='high';
    ctx.drawImage(shipImg,-iw/2,-ih/2+shipSpriteYOffset,iw,ih);
  } else {
    ctx.fillStyle='#1a1a38';ctx.strokeStyle='#8a2cff';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(0,-sh*0.7);ctx.lineTo(-sw*0.5,sh*0.4);ctx.lineTo(sw*0.5,sh*0.4);ctx.closePath();
    ctx.fill();ctx.stroke();
  }

  // ── 3. ЗЕЛЁНЫЙ ИНДИКАТОР КАБИНЫ (при активном бонусе) ──
  if(pw.triple>0||pw.double>0||pw.slow>0){
    ctx.save();
    ctx.globalAlpha=0.75+Math.sin(frame*0.2)*0.2;
    ctx.shadowColor='#44ff88';ctx.shadowBlur=18;
    var gg=ctx.createRadialGradient(0,-ih*0.085,0,0,-ih*0.085,iw*0.14);
    gg.addColorStop(0,'rgba(68,255,136,0.9)');
    gg.addColorStop(0.5,'rgba(68,255,136,0.45)');
    gg.addColorStop(1,'rgba(68,255,136,0)');
    ctx.fillStyle=gg;
    ctx.beginPath();ctx.arc(0,-ih*0.085,iw*0.14,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // ── 4. SHIELD (поверх корабля, покрывает весь PNG) ──
  if(ship.shield>0){
    var sa=0.45+Math.sin(frame*0.18)*0.25;
    var shieldR=Math.max(iw,ih)*0.66;
    ctx.strokeStyle='rgba(68,170,255,'+sa+')';
    ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(0,0,shieldR,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='rgba(120,200,255,'+(sa*0.3)+')';
    ctx.lineWidth=8;
    ctx.beginPath();ctx.arc(0,0,shieldR*0.88,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='rgba(180,220,255,'+(sa*0.5)+')';
    ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(0,0,shieldR*1.04,0,Math.PI*2);ctx.stroke();
  }

  // ── BEAT GLOW (music FX) ──
  if(typeof getMicBeat==='function'&&getMicBeat()){
    ctx.strokeStyle='rgba(138,44,255,0.5)';ctx.lineWidth=4;
    ctx.beginPath();ctx.arc(0,0,Math.max(iw,ih)*0.7,0,Math.PI*2);ctx.stroke();
  }

  ctx.restore();
}

// ═══════════════════════════════════════════════════════
//  DRAW ASTEROID
// ═══════════════════════════════════════════════════════
function drawAst(a){
  ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.rot);
  ctx.beginPath();
  for(var i=0;i<11;i++){
    var ang=(i/11)*Math.PI*2;
    var rr=a.r*(0.78+Math.sin(i*3.1+a.rot)*0.12+Math.cos(i*1.7)*0.08);
    i===0?ctx.moveTo(Math.cos(ang)*rr,Math.sin(ang)*rr):ctx.lineTo(Math.cos(ang)*rr,Math.sin(ang)*rr);
  }
  ctx.closePath();
  var g;
  if(a.type==='crystal'){
    g=ctx.createRadialGradient(-a.r*0.3,-a.r*0.3,0,0,0,a.r);
    g.addColorStop(0,'#aaeeff');g.addColorStop(0.55,'#1155aa');g.addColorStop(1,'#000d22');
  } else {
    g=ctx.createRadialGradient(-a.r*0.3,-a.r*0.3,0,0,0,a.r);
    g.addColorStop(0,'#8a6248');g.addColorStop(0.6,'#3e2a1c');g.addColorStop(1,'#130c06');
  }
  ctx.fillStyle=g;ctx.fill();
  if(a.maxHp>1){for(var h2=0;h2<a.hp;h2++){ctx.fillStyle='#ff6633';ctx.fillRect(-a.r*0.4+h2*10,-a.r-8,8,4);}}
  ctx.strokeStyle=a.col;ctx.lineWidth=a.type==='crystal'?2.5:1.6;ctx.stroke();
  if(a.type!=='crystal'){ctx.beginPath();ctx.arc(-a.r*0.2,-a.r*0.15,a.r*0.25,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,0.45)';ctx.fill();}
  // blackhole capture glow
  if(blackhole){
    var bhADx=a.x-blackhole.x,bhADy=a.y-blackhole.y;
    if(bhADx*bhADx+bhADy*bhADy<blackhole.r*blackhole.r*8){
      ctx.strokeStyle='rgba(180,80,255,0.6)';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(0,0,a.r+3,0,Math.PI*2);ctx.stroke();
    }
  }
  // hit flash
  if(a.hitFlash>0){a.hitFlash--;ctx.globalAlpha=(a.hitFlash/8)*0.7;ctx.beginPath();ctx.arc(0,0,a.r,0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.fill();ctx.globalAlpha=1;}
  ctx.restore();
}

// ═══════════════════════════════════════════════════════
//  DRAW ENEMY
// ═══════════════════════════════════════════════════════
function drawEnemy(e){
  ctx.save();ctx.translate(e.x,e.y);
  var w=e.w,h=e.h;
  ctx.save();ctx.shadowColor='#ff2222';ctx.shadowBlur=18;
  ctx.fillStyle='#1a0808';ctx.strokeStyle='#ff2222';ctx.lineWidth=1.2;
  ctx.beginPath();ctx.moveTo(0,h*0.55);ctx.lineTo(-w*0.6,-h*0.42);ctx.lineTo(-w*0.2,-h*0.28);ctx.lineTo(-w*0.07,0);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,h*0.55);ctx.lineTo(w*0.6,-h*0.42);ctx.lineTo(w*0.2,-h*0.28);ctx.lineTo(w*0.07,0);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.fillStyle='#260808';ctx.beginPath();ctx.ellipse(0,0,w*0.15,h*0.5,0,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.restore();
  ctx.save();ctx.shadowColor='#ff0000';ctx.shadowBlur=10;
  ctx.beginPath();ctx.arc(-w*0.12,-h*0.06,3.5,0,Math.PI*2);ctx.fillStyle='#ff2222';ctx.fill();
  ctx.beginPath();ctx.arc(w*0.12,-h*0.06,3.5,0,Math.PI*2);ctx.fill();ctx.restore();
  for(var i=0;i<e.hp;i++){ctx.fillStyle='#ff4444';ctx.fillRect(-w*0.28+i*12,-h*0.68,9,4);}
  ctx.restore();
}

// ═══════════════════════════════════════════════════════
//  DRAW BONUS
// ═══════════════════════════════════════════════════════
function drawBonusIcon(type, col, r){
  // draw techno icon inside the bonus orb (no emoji)
  ctx.save();
  ctx.strokeStyle=col; ctx.fillStyle=col; ctx.lineWidth=1.5;
  if(type==='shield'){
    // hexagon shield
    ctx.beginPath();
    for(var i=0;i<6;i++){var a=i/6*Math.PI*2-Math.PI/6;ctx.lineTo(Math.cos(a)*r*0.52,Math.sin(a)*r*0.52);}
    ctx.closePath();ctx.stroke();
    ctx.beginPath();ctx.arc(0,0,r*0.22,0,Math.PI*2);ctx.fill();
  } else if(type==='triple'){
    // 3 dots in triangle
    var pts=[[-r*0.3,-r*0.25],[r*0.3,-r*0.25],[0,r*0.32]];
    for(var i=0;i<3;i++){ctx.beginPath();ctx.arc(pts[i][0],pts[i][1],r*0.16,0,Math.PI*2);ctx.fill();}
    // connecting lines
    ctx.globalAlpha=0.5;ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);ctx.lineTo(pts[1][0],pts[1][1]);ctx.lineTo(pts[2][0],pts[2][1]);ctx.closePath();ctx.stroke();
    ctx.globalAlpha=1;
  } else if(type==='bomb'){
    // circle + lines radiate
    ctx.beginPath();ctx.arc(0,0,r*0.3,0,Math.PI*2);ctx.fill();
    for(var i=0;i<8;i++){var a=i/8*Math.PI*2;ctx.beginPath();ctx.moveTo(Math.cos(a)*r*0.34,Math.sin(a)*r*0.34);ctx.lineTo(Math.cos(a)*r*0.54,Math.sin(a)*r*0.54);ctx.stroke();}
  } else if(type==='slow'){
    // clock / hourglass shape
    ctx.beginPath();ctx.arc(0,0,r*0.42,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,-r*0.34);ctx.lineTo(0,0);ctx.lineTo(r*0.22,r*0.22);ctx.stroke();
    ctx.beginPath();ctx.arc(0,0,r*0.06,0,Math.PI*2);ctx.fill();
  } else if(type==='double'){
    // x2 — "x" (lowercase cross) + "2"
    ctx.save();
    ctx.strokeStyle=col;ctx.fillStyle=col;

    // glow pass
    ctx.save();ctx.globalAlpha=0.22;ctx.lineWidth=6;
    ctx.beginPath();ctx.moveTo(-r*0.52,-r*0.18);ctx.lineTo(-r*0.2,r*0.18);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-r*0.2,-r*0.18);ctx.lineTo(-r*0.52,r*0.18);ctx.stroke();
    ctx.restore();

    // "x" — two short diagonal strokes (lowercase, compact)
    ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(-r*0.52,-r*0.18);ctx.lineTo(-r*0.2,r*0.18);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-r*0.2,-r*0.18);ctx.lineTo(-r*0.52,r*0.18);ctx.stroke();

    // "2" — arc top + diagonal + base
    var bx=r*0.04, by=-r*0.26, bw=r*0.44, bh=r*0.52;
    var cx2=bx+bw/2, cy2=by+bh*0.3, rad=bw/2;
    // top arc
    ctx.lineWidth=1.8;
    ctx.beginPath();ctx.arc(cx2,cy2,rad,Math.PI,0,false);ctx.stroke();
    // diagonal down-left
    ctx.beginPath();ctx.moveTo(bx+bw,cy2);ctx.lineTo(bx,by+bh);ctx.stroke();
    // base bar
    ctx.beginPath();ctx.moveTo(bx,by+bh);ctx.lineTo(bx+bw,by+bh);ctx.stroke();

    ctx.restore();
  }
  ctx.restore();
}

function drawBonus(b){
  ctx.save();ctx.translate(b.x,b.y);b.rot+=0.045;b.pulse=(b.pulse||0)+0.1;ctx.rotate(b.rot);
  var glow=0.65+Math.sin(b.pulse)*0.28;
  // outer ring
  ctx.save();ctx.shadowColor=b.col;ctx.shadowBlur=22*glow;
  ctx.beginPath();ctx.arc(0,0,b.r,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fill();
  ctx.strokeStyle=b.col;ctx.lineWidth=2.5;ctx.stroke();
  // inner ring
  ctx.beginPath();ctx.arc(0,0,b.r*0.72,0,Math.PI*2);
  ctx.strokeStyle=b.col;ctx.globalAlpha=0.35;ctx.lineWidth=1;ctx.stroke();
  ctx.restore();ctx.globalAlpha=1;
  // icon
  ctx.fillStyle=b.col;ctx.strokeStyle=b.col;
  drawBonusIcon(b.type,b.col,b.r);
  ctx.restore();
}

// ═══════════════════════════════════════════════════════
//  DRAW BULLET
// ═══════════════════════════════════════════════════════
function drawBullet(b,acc){
  for(var i=0;i<b.trail.length;i++){
    ctx.beginPath();ctx.arc(b.trail[i].x,b.trail[i].y,3*(i/b.trail.length),0,Math.PI*2);
    ctx.fillStyle='rgba(100,180,255,'+(i/b.trail.length*0.5)+')';ctx.fill();
  }
  ctx.save();ctx.shadowColor=acc||'#4488ff';ctx.shadowBlur=16;
  ctx.beginPath();ctx.ellipse(b.x,b.y,3.5,9,0,0,Math.PI*2);ctx.fillStyle='#88ccff';ctx.fill();
  ctx.beginPath();ctx.ellipse(b.x,b.y,1.5,5,0,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  ctx.restore();
}

// ═══════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════
function loop(){
  requestAnimationFrame(loop);
  frame++;
  updateAudio();
  var t=th();

  // pseudo-beat (120 BPM = 2 beats/sec = every 30 frames at 60fps)
  beatT++;
  var onBeat=(beatT%30===0);
  var halfBeat=(beatT%15===0);

  // shake
  if(shakeT>0){shakeX*=0.8;shakeY*=0.8;shakeT--;}else{shakeX=0;shakeY=0;}
  var sx=(Math.random()-0.5)*shakeX,sy=(Math.random()-0.5)*shakeY;

  // clear fully
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,W,H);
  ctx.shadowBlur=0;ctx.shadowColor='transparent';
  ctx.fillStyle=t.bg;ctx.fillRect(0,0,W,H);

  // camera shake transform
  ctx.save();ctx.translate(sx,sy);

  // nebula (pulsing on beat)
  var beatPulse=1+Math.sin(frame*0.105)*0.08;
  var tf=frame*0.0016;
  for(var ni=0;ni<3;ni++){
    var nx=W*(0.2+0.6*Math.sin(tf+ni*2.1));
    var ny=H*(0.25+0.4*Math.cos(tf*0.7+ni));
    var ng=ctx.createRadialGradient(nx,ny,0,nx,ny,W*0.52*beatPulse);
    ng.addColorStop(0,t.nebula);ng.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=ng;ctx.fillRect(0,0,W,H);
  }

  // stars
  var starSpd=1+level*0.07+(onBeat?1.5:0);
  for(var si=0;si<stars.length;si++){
    var s=stars[si];
    s.y+=s.sp*starSpd;
    if(s.y>H+8){s.y=rnd(-20,-5);s.x=rnd(0,W);}
    var sl=s.sp*5*(onBeat?2:1);
    var sg=ctx.createLinearGradient(s.x,s.y,s.x,s.y+sl);
    sg.addColorStop(0,t.star+s.op*0.5+')');sg.addColorStop(1,t.star+'0)');
    ctx.strokeStyle=sg;ctx.lineWidth=s.r*0.44;
    ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x,s.y+sl);ctx.stroke();
    ctx.beginPath();ctx.arc(s.x,s.y,s.r*0.4,0,Math.PI*2);
    ctx.fillStyle=t.star+s.op+')';ctx.fill();
  }

  // shockwave — clipped to canvas, fully fades before removal
  if(shockwave){
    shockwave.r+=shockwave.sp;shockwave.sp*=0.95;
    shockwave.life=(shockwave.life===undefined)?1:shockwave.life;
    shockwave.life-=0.018;
    var swA=Math.max(0,shockwave.life)*(1-shockwave.r/shockwave.maxR);
    swA=Math.max(0,swA);
    if(swA>0.005){
      ctx.save();
      ctx.beginPath();ctx.rect(0,0,W,H);ctx.clip();
      var lw=Math.max(0.5,6*(1-shockwave.r/shockwave.maxR));
      ctx.beginPath();ctx.arc(shockwave.x,shockwave.y,Math.min(shockwave.r,Math.max(W,H)*1.5),0,Math.PI*2);
      ctx.strokeStyle='rgba(255,255,255,'+(swA*0.6)+')';ctx.lineWidth=lw;ctx.stroke();
      ctx.beginPath();ctx.arc(shockwave.x,shockwave.y,Math.min(shockwave.r*0.82,Math.max(W,H)*1.5),0,Math.PI*2);
      ctx.strokeStyle='rgba(80,140,255,'+(swA*0.35)+')';ctx.lineWidth=Math.max(0.5,lw*0.6);ctx.stroke();
      ctx.restore();
    }
    if(shockwave.life<=0||shockwave.r>=shockwave.maxR){shockwave=null;}
  }

  if(state==='playing'){

    // transition
    if(inTrans){transT--;if(transT<=0){inTrans=false;asteroids=[];enemies=[];eBullets=[];interferences=[];megaWave=null;}}

    // powerup timers
    if(pw.triple>0){pw.triple--;if(pw.triple===0){showEvent('TRIPLE SHOT ended','#225533');updatePURow();}}
    if(pw.slow>0){pw.slow--;if(pw.slow===0){asteroids.forEach(function(a){a.vy=a.baseVy;});showEvent('SLOW MO ended','#443355');updatePURow();}}
    if(pw.double>0){pw.double--;if(pw.double===0){pw.doubleMult=1;showEvent('SCORE MULT ended','#444422');updatePURow();}}
    if(ship.iframes>0)ship.iframes--;
    if(ship.recoil>0)ship.recoil*=0.75;

    // fire cooldown + energy regen
    if(fireCooldown>0)fireCooldown--;
    if(!isHolding&&fireEnergy<maxFireEnergy)fireEnergy=Math.min(maxFireEnergy,fireEnergy+REGEN);
    updateFireBtn();

    // life restore handled below after score update

    // combo decay
    if(comboT>0){comboT--;if(comboT===0)resetCombo();}

    // score + level + life restore
    if(!inTrans){
      scoreAcc++;
      if(scoreAcc>=13){
        scoreAcc=0;
        score++;
        document.getElementById('hudScore').textContent=score;
        document.getElementById('hudBest').textContent='BEST: '+Math.max(score,best);
        // level up check
        var nl=Math.floor(score/1000)+1;
        if(nl>level&&!pendingLvl){pendingLvl=nl;triggerLevelUp(nl);}
        // life restore every 1000 pts
        if(score>=nextLifeScore){
          if(lives<maxLives){lives++;updateLivesUI();showEvent('LIFE RESTORED','#ff4488');}
          nextLifeScore+=1000;
        }
      }
    }

    // wave
    if(!inTrans)updateWave();

    // bot controller
    if(botTest.enabled)updateBotController();
    updateBotButtonVisuals();
    updateBlackholeBar();

    // ship
    var tvx=moveDir*(7.5+level*0.22);
    ship.vx+=(tvx-ship.vx)*0.15;ship.tilt=ship.vx/7;
    ship.x=Math.max(ship.w*0.5+10,Math.min(W-ship.w*0.5-10,ship.x+ship.vx));
    if(firing){isHolding=true;shoot(true);}else{isHolding=false;}

    // spawn
    if(!inTrans){
      var d=diff();
      // astMod: во время boss asteroid реже (но не 0!)
      var astMod=(boss&&!boss.dying)?2.5:1;
      // обычный поток метеоритов — всегда работает
      astT++;
      if(astT>=d.astInt*astMod){spawnAst();astT=0;}
      // дополнительный спавн на высоких уровнях
      if(!boss&&level>=2&&astT===Math.floor(d.astInt*astMod*0.5)&&Math.random()<0.3)spawnAst();
      if(level>=d.enemyFrom){enemyT++;if(enemyT>=d.enemyInt){spawnEnemy();enemyT=0;}}
      if(level>=d.interfFrom){interfTimer++;if(interfTimer>=d.interfInt){spawnInterference();interfTimer=0;}}
      updateBoss();
    }

    // bullets
    for(var bi=0;bi<bullets.length;bi++){
      var b=bullets[bi];b.trail.push({x:b.x,y:b.y});if(b.trail.length>8)b.trail.shift();
      b.y-=b.sp;b.x+=b.vx||0;
    }
    bullets=bullets.filter(function(b){return b.y>-20;});
    for(var ebi=0;ebi<eBullets.length;ebi++){eBullets[ebi].x+=eBullets[ebi].vx;eBullets[ebi].y+=eBullets[ebi].vy;}
    eBullets=eBullets.filter(function(eb){return eb.y<H+20;});

    // asteroids
    for(var ai=0;ai<asteroids.length;ai++){asteroids[ai].x+=asteroids[ai].vx;asteroids[ai].y+=asteroids[ai].vy;asteroids[ai].rot+=asteroids[ai].rs;bhPull(asteroids[ai],3.5);}
    asteroids=asteroids.filter(function(a){return a.y<H+80;});

    // enemies
    for(var ei=0;ei<enemies.length;ei++){
      var en=enemies[ei];en.y+=en.vy;en.phase+=0.04;
      en.x=en.baseX+Math.sin(en.phase)*en.amp;
      en.x=Math.max(en.w/2+5,Math.min(W-en.w/2-5,en.x));
      en.baseX+=en.vx;en.stimer--;
      if(en.stimer<=0){
        en.stimer=55+Math.floor(Math.random()*60);
        var dx=ship.x-en.x,dy=ship.y-en.y,dd=Math.sqrt(dx*dx+dy*dy)||1;
        eBullets.push({x:en.x,y:en.y+en.h/2,vx:(dx/dd)*4.5,vy:(dy/dd)*4.5});
      }
    }
    enemies=enemies.filter(function(e){return e.y<H+60&&e.hp>0;});
    // move interferences
    for(var ii=0;ii<interferences.length;ii++){var it=interferences[ii];it.y+=it.vy;it.x+=it.vx;it.rot+=it.rs;it.phase+=0.05;bhPull(it,4.0);}
    interferences=interferences.filter(function(it){return it.y<H+80;});

    // score drain пока interference на экране
    if(interferences.length>0&&!inTrans){
      scoreDrain+=interferences.length*0.04;
      if(scoreDrain>=1){
        var drain=Math.floor(scoreDrain);
        score=Math.max(0,score-drain);
        scoreDrain-=drain;
        document.getElementById('hudScore').textContent=score;
      }
    } else { scoreDrain=0; }

    // update blackhole
    updateBlackhole();

    // bonuses
    for(var bni=0;bni<bonuses.length;bni++){bonuses[bni].y+=bonuses[bni].vy;bhPull(bonuses[bni],1.2);}
    bonuses=bonuses.filter(function(b){return b.y<H+30;});

    // collisions: bullets → asteroids/enemies
    bullets=bullets.filter(function(b){
      var hit=false;
      asteroids=asteroids.filter(function(a){
        if(d2(b.x,b.y,a.x,a.y)<a.r*a.r){
          a.hp--;a.hitFlash=8;
          if(a.hp<=0){
            addBoom(a.x,a.y,a.r>32,a.col,10);
            addScore(a.pts);addCombo();
            var chance=a.type==='crystal'?0.88:a.type==='big'?0.42:0.12;
            if(Math.random()<chance)spawnBonus(a.x,a.y);
            if(a.type==='big'&&a.r>38){spawnAst('normal');spawnAst('normal');}
            pw.energy=Math.min(MAX_ENERGY,pw.energy+(a.type==='crystal'?16:8));
            if(pw.energy>=MAX_ENERGY&&!pw.superReady){pw.superReady=true;updateEnergy();}
            updateEnergy();hit=true;return false;
          } else {addBoom(a.x,a.y,false,'#ffaa44',5);hit=true;return true;}
        }
        return true;
      });
      if(!hit){
        enemies=enemies.filter(function(en){
          if(Math.abs(b.x-en.x)<en.w*0.58&&Math.abs(b.y-en.y)<en.h*0.58){
            en.hp--;hit=true;
            if(en.hp<=0){addBoom(en.x,en.y,true,t.accent,14);addScore(80);addCombo();}
            return en.hp>0;
          }
          return true;
        });
        if(!hit){
          interferences=interferences.filter(function(it){
            var dx=b.x-it.x,dy=b.y-it.y;
            if(dx*dx+dy*dy<it.r*it.r){
              it.hp--;it.hitFlash=8;hit=true;
              if(it.hp<=0){
                triggerGlitch(14);
                addBoom(it.x,it.y,false,'#aa44ff',14);
                var pi;for(pi=0;pi<16;pi++){var pa=rnd(0,Math.PI*2);parts.push({x:it.x,y:it.y,vx:Math.cos(pa)*rnd(2,6),vy:Math.sin(pa)*rnd(2,6),r:rnd(2,4),life:1,decay:0.04+rnd(0,0.04),col:'#aa44ff'});}
                addScore(60);addCombo();return false;
              }
              addBoom(it.x,it.y,false,'#7722cc',4);
              return true;
            }
            return true;
          });
        }
      }
      return !hit;
    });

    // near miss
    for(var nmi=0;nmi<asteroids.length;nmi++){
      var a=asteroids[nmi];
      if(!a.nm&&a.y>ship.y-a.r-90&&a.y<ship.y+a.r+50){
        var nd=Math.sqrt(d2(a.x,a.y,ship.x,ship.y));
        if(nd>a.r+ship.w*0.38&&nd<a.r+ship.w*1.0){
          a.nm=true;addScore(25,true);showNearMiss(ship.x,ship.y);
        }
      }
    }

    // ship collision
    if(ship.iframes===0){
      var hitShip=false;
      for(var ci=0;ci<asteroids.length;ci++){if(cirR(asteroids[ci].x,asteroids[ci].y,asteroids[ci].r*0.82,ship.x,ship.y,ship.w*0.7,ship.h*0.8))hitShip=true;}
      for(var dei=0;dei<enemies.length;dei++){if(cirR(enemies[dei].x,enemies[dei].y,Math.min(enemies[dei].w,enemies[dei].h)*0.5,ship.x,ship.y,ship.w*0.7,ship.h*0.8))hitShip=true;}
      for(var ifi=0;ifi<interferences.length;ifi++){var itmp=interferences[ifi];var idx2=itmp.x-ship.x,idy2=itmp.y-ship.y;if(idx2*idx2+idy2*idy2<(itmp.r*0.7+ship.w*0.3)*(itmp.r*0.7+ship.w*0.3))hitShip=true;}
      if(boss&&!boss.dying&&cirR(boss.x,boss.y,boss.r*0.85,ship.x,ship.y,ship.w*0.7,ship.h*0.8))hitShip=true;
      for(var eb2=0;eb2<eBullets.length;eb2++){if(Math.abs(eBullets[eb2].x-ship.x)<ship.w*0.44&&Math.abs(eBullets[eb2].y-ship.y)<ship.h*0.44)hitShip=true;}

      if(hitShip){
        if(ship.shield>0){
          ship.shield=0;ship.iframes=100;resetCombo();
          addBoom(ship.x,ship.y,false,'#44aaff',16);
          // GLITCH SHIELD BROKEN
          triggerGlitch(35);triggerShake(16,22);triggerChroma(30);
          showEvent('SHIELD BROKEN','#44aaff');
          // hide controls briefly for glitch effect
          var ctrl=document.getElementById('controls');
          ctrl.style.opacity='0';ctrl.style.filter='blur(4px)';
          setTimeout(function(){ctrl.style.opacity='';ctrl.style.filter='';},500);
          updatePURow();
        } else if(flashT===0){
          var isDead=loseLife();
          if(isDead){
            addBoom(ship.x,ship.y,true,'#ffaa33');
            flashT=60;triggerGlitch(40);triggerShake(18,25);
            var fs=score;
            setTimeout(function(){
              state='dead';
              moveDir=0;firing=false;updateBotButtonVisuals();updateBlackholeBar();
              if(fs>best){best=fs;localStorage.setItem('sfv4',best);}
              document.getElementById('goScore').textContent=fs;
              document.getElementById('goBest').textContent=best;
              if(botTest.enabled)showBotReport(fs);
              document.getElementById('goScreen').classList.remove('hidden');
              document.getElementById('hud').classList.add('hidden');
              document.getElementById('controls').classList.add('hidden');
              document.getElementById('energyWrap').classList.add('hidden');
              document.getElementById('puRow').innerHTML='';
            },900);
          }
        }
      }
    }

    // collect bonuses
    bonuses=bonuses.filter(function(b){
      var dx=b.x-ship.x,dy=b.y-ship.y;
      if(dx*dx+dy*dy<(b.r+ship.w*0.48)*(b.r+ship.w*0.48)){collectBonus(b.type);return false;}
      return true;
    });

    // ── DRAW GAME OBJECTS ──
    for(var ebd=0;ebd<eBullets.length;ebd++){
      ctx.save();ctx.shadowColor='#ff4444';ctx.shadowBlur=10;
      ctx.beginPath();ctx.arc(eBullets[ebd].x,eBullets[ebd].y,4,0,Math.PI*2);ctx.fillStyle='#ff6666';ctx.fill();ctx.restore();
    }
    asteroids.forEach(drawAst);
    enemies.forEach(drawEnemy);
    interferences.forEach(drawInterference);
    drawBoss();
    bonuses.forEach(drawBonus);
    bullets.forEach(function(b){drawBullet(b,t.accent);});

    updateAndDrawMegaWave();
    drawBlackhole();
    // drawBHCooldown(); // hidden: removes unwanted purple cooldown circle near controls
    if(flashT===0||Math.floor(flashT/4)%2===0)drawShip(ship.x,ship.y,ship.tilt);
    drawBossHP();

    // flash
    if(flashT>0){flashT--;ctx.fillStyle='rgba(255,90,30,'+(flashT/60*0.6)+')';ctx.fillRect(-30,-30,W+60,H+60);}

    // beat UI pulse
    if(halfBeat){
      var hudEl=document.getElementById('hudScore');
      hudEl.style.textShadow='0 0 20px '+t.accent+',0 0 40px '+t.accent;
      setTimeout(function(){hudEl.style.textShadow='';},100);
    }
  }

  // explosions + particles (always, clipped)
  ctx.globalAlpha=1;
  ctx.save();ctx.beginPath();ctx.rect(0,0,W,H);ctx.clip();
  for(var xi=expl.length-1;xi>=0;xi--){
    var ex=expl[xi];ex.x+=ex.vx;ex.y+=ex.vy;ex.vy+=0.06;ex.life-=ex.decay;
    if(ex.life<=0){expl.splice(xi,1);continue;}
    ctx.globalAlpha=Math.max(0,ex.life);
    ctx.beginPath();ctx.arc(ex.x,ex.y,ex.r*ex.life,0,Math.PI*2);ctx.fillStyle=ex.col;ctx.fill();
  }
  for(var pi=parts.length-1;pi>=0;pi--){
    var p=parts[pi];p.x+=p.vx;p.y+=p.vy;p.vx*=0.97;p.vy*=0.97;p.life-=p.decay;
    if(p.life<=0){parts.splice(pi,1);continue;}
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.col;ctx.fill();
  }
  ctx.globalAlpha=1;ctx.restore();

  // glitch lines
  if(glitchT>0){
    glitchT--;
    for(var gl=0;gl<4;gl++){
      var gy2=rnd(0,H),gh=rnd(2,8);
      ctx.fillStyle='rgba(255,255,255,'+(rnd(0.04,0.12))+')';
      ctx.fillRect(0,gy2,W,gh);
      // color shift strip
      ctx.fillStyle='rgba(255,0,80,0.07)';ctx.fillRect(rnd(-20,0),gy2,W+40,gh);
      ctx.fillStyle='rgba(0,200,255,0.07)';ctx.fillRect(rnd(0,20),gy2,W,gh);
    }
  }

  // chromatic aberration
  if(chromaT>0){
    chromaT--;
    var ca=Math.min(1,chromaT/20)*0.06;
    ctx.save();ctx.globalAlpha=ca;
    ctx.globalCompositeOperation='screen';
    ctx.drawImage(C,3,0);ctx.globalAlpha=ca;ctx.drawImage(C,-3,0);
    ctx.restore();ctx.globalCompositeOperation='source-over';
  }

  // vignette
  var vg=ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.78);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,20,0.86)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);

  drawMusicFX(); // music reactive overlay
  ctx.restore(); // end shake
}

function setupCtrl(){
  var lb=document.getElementById('leftBtn'),rb=document.getElementById('rightBtn'),fb=document.getElementById('fireBtn'),sb=document.getElementById('superBtn');
  lb.addEventListener('touchstart',function(e){e.preventDefault();moveDir=-1;lb.style.borderColor='#4488ff';},{passive:false});
  lb.addEventListener('touchend',function(e){e.preventDefault();if(moveDir===-1)moveDir=0;lb.style.borderColor='';},{passive:false});
  lb.addEventListener('touchcancel',function(){if(moveDir===-1)moveDir=0;},{passive:false});
  lb.addEventListener('mousedown',function(){moveDir=-1;});lb.addEventListener('mouseup',function(){moveDir=0;});
  rb.addEventListener('touchstart',function(e){e.preventDefault();moveDir=1;rb.style.borderColor='#4488ff';},{passive:false});
  rb.addEventListener('touchend',function(e){e.preventDefault();if(moveDir===1)moveDir=0;rb.style.borderColor='';},{passive:false});
  rb.addEventListener('touchcancel',function(){if(moveDir===1)moveDir=0;},{passive:false});
  rb.addEventListener('mousedown',function(){moveDir=1;});rb.addEventListener('mouseup',function(){moveDir=0;});
  fb.addEventListener('touchstart',function(e){e.preventDefault();isHolding=true;firing=true;shoot(false);},{passive:false});
  fb.addEventListener('touchend',function(e){e.preventDefault();firing=false;isHolding=false;},{passive:false});
  fb.addEventListener('click',function(){isHolding=false;shoot(false);});
  sb.addEventListener('touchstart',function(e){e.preventDefault();superBlast();},{passive:false});
  sb.addEventListener('click',function(){superBlast();});
}

function startGame(){
  reset();
  if(botMode){
    botResetStats();
  }else{
    botDisableStats();
  }
  state='playing';
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('goScreen').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');

  // In bot mode, do not show manual control buttons.
  // In player mode, keep the original controls.
  if(botMode){
    document.getElementById('controls').classList.add('hidden');
  }else{
    document.getElementById('controls').classList.remove('hidden');
  }

  document.getElementById('energyWrap').classList.remove('hidden');
  var eTrack=document.getElementById('eTrack');
  if(eTrack)eTrack.style.display=botMode?'none':'';
  var bhTrack=document.getElementById('bhTrack');
  if(bhTrack)bhTrack.style.display=botMode?'none':'';
  document.getElementById('superBtn').classList.add('hidden');
  document.getElementById('superBtn').classList.remove('ready');
  setupCtrl();
}

document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('restartBtn').addEventListener('click',startGame);
document.getElementById('botModeBtn').addEventListener('click',toggleBotMode);
document.getElementById('playerNameInput').addEventListener('input',sanitizePlayerNameInput);
updateBotModeUI();
document.getElementById('copyReportBtn').addEventListener('click',function(){
  var r=document.getElementById('botReport');
  if(!r)return;
  r.focus();r.select();
  try{
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(r.value);
    }else{
      document.execCommand('copy');
    }
  }catch(e){}
});


// Blackhole / magnet tap handler
// One tap places the magnet. No need to hold the finger anymore.
document.addEventListener('touchstart',function(e){
  if(state!=='playing')return;

  // Do not activate magnet from bottom controls or UI.
  if(e.target && e.target.closest && e.target.closest('#controls,#superBtn,#energyWrap'))return;

  var touch=e.touches[0];
  var wrap=document.getElementById('gameWrap');
  var rect=wrap?wrap.getBoundingClientRect():{left:0,top:0};
  var lx=touch.clientX-rect.left;
  var ly=touch.clientY-rect.top;
  placeBlackholeAt(lx,ly);
},{passive:true});

// Magnet is now tap-to-place, so move/end no longer cancel it.
document.addEventListener('touchmove',function(e){},{passive:true});
document.addEventListener('touchend',function(e){},{passive:true});

document.addEventListener('keydown',function(e){
  if(e.target&&e.target.id==='playerNameInput')return;
  if(e.key==='ArrowLeft')moveDir=-1;
  if(e.key==='ArrowRight')moveDir=1;
  if(e.key===' '||e.key==='ArrowUp'){if(!firing){isHolding=false;shoot(false);}firing=true;}
  if(e.key==='s'||e.key==='S')superBlast();
  e.preventDefault();
});
document.addEventListener('keyup',function(e){
  if(e.target&&e.target.id==='playerNameInput')return;
  if(e.key==='ArrowLeft'&&moveDir===-1)moveDir=0;
  if(e.key==='ArrowRight'&&moveDir===1)moveDir=0;
  if(e.key===' '||e.key==='ArrowUp')firing=false;
});

var micActive=false, micEnabled=false, audioCtx=null, analyser=null, freqData=null;
var micBass=0, micMid=0, micHigh=0;
var prevBass=0, beatPulse=0, beatT2=0;
var MFX=0.7; // musicFxStrength

// Сглаженные значения
var sBass=0, sMid=0, sHigh=0;


function startMic(){
  // Toggle off
  if(micEnabled){
    micEnabled=false;micActive=false;
    sBass=0;sMid=0;sHigh=0;beatPulse=0;
                var ms3=document.getElementById('micStatus');
    if(ms3)ms3.textContent='MIC IS USED ONLY FOR VISUAL EFFECTS';
    return;
  }
  var micSt=document.getElementById('micStatus');
  // Проверяем HTTPS
  if(!window.isSecureContext){
    if(micSt)micSt.textContent='MIC NEEDS HTTPS';
        return;
  }
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    if(micSt)micSt.textContent='MIC NOT AVAILABLE';
        return;
  }
  if(micSt)micSt.textContent='REQUESTING MIC...';
  navigator.mediaDevices.getUserMedia({audio:true,video:false})
    .then(function(stream){
      try{
        audioCtx=new (window.AudioContext||window.webkitAudioContext)();
        analyser=audioCtx.createAnalyser();
        analyser.fftSize=256;
        analyser.smoothingTimeConstant=0.7;
        freqData=new Uint8Array(analyser.frequencyBinCount);
        var src=audioCtx.createMediaStreamSource(stream);
        src.connect(analyser);
        micActive=true;micEnabled=true;
                                var ms2=document.getElementById('micStatus');
        if(ms2)ms2.textContent='MIC FX ON · NO AUDIO IS SAVED';
      }catch(e){micEnabled=false;}
    })
    .catch(function(){
            var ms=document.getElementById('micStatus');
      if(ms)ms.textContent='MIC ACCESS DENIED · NO AUDIO SAVED';
      micEnabled=false;
    });
}

function updateAudio(){
  if(!micEnabled)return; // не анализируем если не включено
  if(micActive&&analyser){
    analyser.getByteFrequencyData(freqData);
    var len=freqData.length;
    // bass 0-10%, mid 10-40%, high 40-100%
    var bassEnd=Math.floor(len*0.10);
    var midEnd=Math.floor(len*0.40);
    var b=0,m=0,hi=0,i;
    for(i=0;i<bassEnd;i++) b+=freqData[i];
    for(i=bassEnd;i<midEnd;i++) m+=freqData[i];
    for(i=midEnd;i<len;i++) hi+=freqData[i];
    micBass  = (b/bassEnd)/255;
    micMid   = (m/(midEnd-bassEnd))/255;
    micHigh  = (hi/(len-midEnd))/255;
  } else {
    micBass=0;micMid=0;micHigh=0;
  }
  // сглаживание
  sBass = sBass*0.72 + micBass*0.28;
  sMid  = sMid *0.75 + micMid *0.25;
  sHigh = sHigh*0.78 + micHigh*0.22;

  // beat detection по басу
  beatT2++;
  if(sBass>0.45&&sBass>prevBass*1.2&&beatT2>12){
    beatPulse=18;
    beatT2=0;
  }
  prevBass=sBass;
  if(beatPulse>0) beatPulse--;
}

// Рисуем music reactive эффекты поверх всего (вызывается в конце loop)
function drawMusicFX(){
  if(!micEnabled)return;
  var b=sBass*MFX, m=sMid*MFX, hi=sHigh*MFX;
  var beat=(beatPulse>0)?(beatPulse/18)*MFX:0;
  var i;

  // ── БАС: пульсация фона (всегда, сила зависит от bass) ──
  var bgA=b*0.22+0.04;
  var bg2=ctx.createRadialGradient(W/2,H*0.55,0,W/2,H*0.55,W*0.8);
  bg2.addColorStop(0,'rgba(90,0,180,'+bgA+')');
  bg2.addColorStop(0.5,'rgba(50,0,100,'+(bgA*0.5)+')');
  bg2.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=bg2;ctx.fillRect(0,0,W,H);

  // ── BEAT: световая вспышка + кольцо ──
  if(beat>0.25){
    ctx.save();
    // Большое кольцо от центра
    ctx.strokeStyle='rgba(160,80,255,'+(beat*0.7)+')';
    ctx.lineWidth=beat*8;
    ctx.beginPath();ctx.arc(W/2,H/2,W*0.25+W*0.15*beat,0,Math.PI*2);ctx.stroke();
    // Вспышка края экрана
    ctx.strokeStyle='rgba(120,60,220,'+(beat*0.35)+')';
    ctx.lineWidth=beat*20;
    ctx.strokeRect(0,0,W,H);
    ctx.restore();
  }

  // ── MID: laser lines горизонтальные ──
  if(m>0.2){
    var lineCount=Math.floor(m*5)+1;
    for(i=0;i<lineCount;i++){
      var ly=rnd(H*0.1,H*0.85);
      var lg=ctx.createLinearGradient(0,ly,W,ly);
      lg.addColorStop(0,'rgba(100,40,255,0)');
      lg.addColorStop(0.3,'rgba(160,80,255,'+(m*0.35)+')');
      lg.addColorStop(0.7,'rgba(160,80,255,'+(m*0.35)+')');
      lg.addColorStop(1,'rgba(100,40,255,0)');
      ctx.fillStyle=lg;
      ctx.fillRect(0,ly,W,1);
    }
  }

  // ── HIGH: искры ──
  if(hi>0.2){
    var sc=Math.floor(hi*20*MFX);
    for(i=0;i<sc;i++){
      var sx=rnd(0,W),sy=rnd(0,H*0.85);
      var sa2=hi*0.8;
      ctx.fillStyle='rgba(200,140,255,'+sa2+')';
      ctx.fillRect(sx,sy,rnd(1,2),rnd(1,3));
    }
    // thin laser lines
    if(frame%2===0){
      ctx.strokeStyle='rgba(180,100,255,'+(hi*0.25)+')';
      ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(rnd(0,W),0);ctx.lineTo(rnd(0,W),H);ctx.stroke();
    }
  }

  // ── BEAT HUD glow ──
  if(beat>0.4&&state==='playing'){
    var he=document.getElementById('hudScore');
    if(he){he.style.textShadow='0 0 '+(beat*35)+'px #cc88ff,0 0 '+(beat*70)+'px #7733ff';
      setTimeout(function(){if(he)he.style.textShadow='';},90);}
  }

  // ══ ЭКВАЛАЙЗЕР (подложка ПЕРВАЯ, потом бары) ══
  var eqW=Math.min(W*0.72,300);
  var eqX=(W-eqW)/2;
  var eqY=H-168;
  var barCount=28;
  var bSlot=eqW/barCount;
  var barW2=bSlot*0.6;
  var maxBarH=44;

  // 1. подложка
  ctx.fillStyle='rgba(10,0,25,0.55)';
  ctx.fillRect(eqX-6, eqY-maxBarH-6, eqW+12, maxBarH+10);
  ctx.strokeStyle='rgba(100,40,200,0.4)';
  ctx.lineWidth=1;
  ctx.strokeRect(eqX-6, eqY-maxBarH-6, eqW+12, maxBarH+10);

  // 2. бары
  for(i=0;i<barCount;i++){
    var pct2=i/barCount;
    var val2;
    if(pct2<0.35)      val2=sBass*(1-pct2/0.35)+sMid*(pct2/0.35);
    else if(pct2<0.65) val2=sMid*(1-(pct2-0.35)/0.3)+sHigh*((pct2-0.35)/0.3);
    else               val2=sHigh;
    val2=Math.max(0.07+Math.random()*0.04, val2);
    var bh2=Math.round(val2*maxBarH);
    var bx2=eqX+i*bSlot;
    var cr2=Math.floor(100+pct2*120);
    var cg2=Math.floor(30+pct2*80);
    var cb2=Math.floor(255-pct2*60);
    ctx.fillStyle='rgba('+cr2+','+cg2+','+cb2+',0.9)';
    ctx.fillRect(bx2, eqY-bh2, barW2, bh2);
    // bright top cap
    ctx.fillStyle='rgba(230,180,255,1)';
    ctx.fillRect(bx2, eqY-bh2-2, barW2, 2);
  }

  // 3. debug values
  ctx.fillStyle='rgba(160,120,255,0.65)';
  ctx.font='9px Courier New';
  ctx.fillText('B:'+sBass.toFixed(2)+' M:'+sMid.toFixed(2)+' H:'+sHigh.toFixed(2), eqX, eqY+10);
}
